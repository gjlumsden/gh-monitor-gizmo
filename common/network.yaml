logger:
  # INFO on normal builds keeps UART quiet enough that heavy fetch
  # cycles can't backpressure the scheduler on the S3. Raise to DEBUG
  # temporarily when diagnosing a specific subsystem.
  level: INFO

ota:
  - platform: esphome
    password: !secret ghgizmo_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Static IP. Remove this whole `manual_ip:` block to use DHCP.
  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway}
    subnet: ${subnet}
    dns1: ${dns1}
    dns2: ${dns2}

  ap:
    ssid: "GH Monitor Gizmo"
    password: !secret ghgizmo_ap_password

http_request:
  useragent: "esphome-m5stick"
  timeout: 15s
  verify_ssl: false
  follow_redirects: true
  buffer_size_rx: ${http_buffer_rx_size}
  buffer_size_tx: ${http_buffer_tx_size}

# Time: used for the rate-limit reset countdown. SNTP is fire-and-forget;
# if the network is down the card just hides the countdown.
time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - "pool.ntp.org"
      - "time.cloudflare.com"
    # Immediately correct screen state once SNTP first syncs, so a device
    # that boots inside the night window doesn't leave the screen on for
    # up to 30 s waiting for the polling interval.
    on_time_sync:
      then:
        - script.execute: apply_screen_power

