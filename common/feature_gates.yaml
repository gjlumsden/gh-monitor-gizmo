# Runtime feature gates (issue #9 part C).
#
# Each of the flags below started life as a compile-time
# `${foo_enabled}` substitution. They are now `globals:` with
# `restore_value: yes` so user choices survive a reboot, and each one is
# paired with a template `switch:` so Home Assistant (or the standalone
# web_server) can flip the gate live without a reflash.
#
# The initial_value for every flag matches the original substitution
# default ("true"). Template switches use `restore_mode: RESTORE_DEFAULT_ON`
# so a freshly-flashed device -- before any HA / web_server interaction
# -- behaves identically to the previous compile-time default.
#
# This file is chain-included from the end of common/globals.yaml so the
# nine items below extend that file's top-level `globals:` list (ESPHome
# rejects two top-level `globals:` keys in one document). The `switch:`
# block is top-level and self-contained.
  - id: beeps_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: card_beep_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: dependabot_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: user_events_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: copilot_usage_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: stats_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: stats_search_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: calendar_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: rate_limit_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'

switch:
  - platform: template
    name: "Beeps Enabled"
    icon: "mdi:bell"
    lambda: 'return id(beeps_enabled);'
    turn_on_action:
      - lambda: 'id(beeps_enabled) = true;'
    turn_off_action:
      - lambda: 'id(beeps_enabled) = false;'
    optimistic: false
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Card Beep Enabled"
    icon: "mdi:bell-ring-outline"
