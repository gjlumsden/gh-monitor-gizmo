  - id: fetch_user_events
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "user_events start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      - http_request.get:
          # per_page=8 + 40 KB buffer: PushEvents with many commits can balloon
          # to 8-10 KB each, so 10 events occasionally exceeded the old 32 KB
          # cap and ArduinoJson returned IncompleteInput. Belt-and-braces: trim
          # per_page to 8 (carousel only renders the top ~5 anyway) AND raise
          # the buffer to 40 KB. S3 has 8+ MB PSRAM free; Plus transient cost
          # is ~8 KB extra DRAM for the duration of the fetch.
          url: "https://api.github.com/users/${github_user}/events?per_page=8"
          max_response_buffer_size: 40960
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(user_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(user_retry_pending) = true;'
                  - logger.log:
                      format: "user events fetch failed, retrying in 10s"
                      level: WARN
                      tag: "github"
                  - delay: 10s
                  - script.execute: fetch_user_events
                else:
                  - logger.log:
                      format: "user events fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(user_retry_pending) = false;'
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("github", "user events HTTP %d", response->status_code);
                    return;
                  }
                  // Filter - keep only fields we use, so 30 events fit easily
                  JsonDocument filter;
                  filter[0]["id"] = true;
                  filter[0]["type"] = true;
                  filter[0]["created_at"] = true;
                  filter[0]["repo"]["name"] = true;
                  filter[0]["actor"]["login"] = true;
                  filter[0]["payload"]["workflow_run"]["status"] = true;
                  filter[0]["payload"]["workflow_run"]["conclusion"] = true;
                  filter[0]["payload"]["workflow_run"]["actor"]["login"] = true;
                  filter[0]["payload"]["workflow_run"]["triggering_actor"]["login"] = true;
                  filter[0]["payload"]["check_run"]["status"] = true;
                  filter[0]["payload"]["check_run"]["conclusion"] = true;
                  filter[0]["payload"]["pull_request"]["user"]["login"] = true;
                  filter[0]["payload"]["pull_request"]["requested_reviewers"][0]["login"] = true;
                  filter[0]["payload"]["review"]["user"]["login"] = true;
                  filter[0]["payload"]["comment"]["user"]["login"] = true;
                  filter[0]["payload"]["issue"]["user"]["login"] = true;
                  filter[0]["payload"]["ref"] = true;
                  filter[0]["payload"]["ref_type"] = true;
                  filter[0]["payload"]["action"] = true;
                  filter[0]["payload"]["issue"]["number"] = true;
                  filter[0]["payload"]["pull_request"]["number"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "user json parse failed: %s", err.c_str());
                    return;
                  }
                  JsonArray arr = doc.as<JsonArray>();
                  if (arr.isNull()) return;

                  // Relative-age helper. GitHub's events API can go
                  // stale (private org repos often don't emit public
                  // events), so showing age on each carousel slide makes
                  // it obvious when the "top" event is actually hours or
                  // days old.
                  auto days_from_civil = [](int y, unsigned m, unsigned d) -> long {
                    y -= m <= 2;
                    const long era = (y >= 0 ? y : y - 399) / 400;
                    const unsigned yoe = static_cast<unsigned>(y - era * 400);
                    const unsigned doy = (153 * (m > 2 ? m - 3 : m + 9) + 2) / 5 + d - 1;
                    const unsigned doe = yoe * 365 + yoe / 4 - yoe / 100 + doy;
                    return era * 146097L + static_cast<long>(doe) - 719468L;
                  };
                  auto age_suffix = [&](const char *created_at) -> std::string {
                    if (!created_at || !*created_at) return "";
                    int Y, M, D, h, mi, s;
                    if (sscanf(created_at, "%d-%d-%dT%d:%d:%dZ",
                               &Y, &M, &D, &h, &mi, &s) != 6) return "";
                    long days = days_from_civil(Y, (unsigned) M, (unsigned) D);
                    time_t ev_t = (time_t) days * 86400 + h * 3600 + mi * 60 + s;
                    auto now = id(sntp_time).now();
                    if (!now.is_valid()) return "";
                    long secs = (long) now.timestamp - (long) ev_t;
                    if (secs < 0) secs = 0;
                    char b[16];
                    if (secs < 90)            snprintf(b, sizeof(b), " %lds ago", secs);
                    else if (secs < 90 * 60)  snprintf(b, sizeof(b), " %ldm ago", secs / 60);
                    else if (secs < 48 * 3600) snprintf(b, sizeof(b), " %ldh ago", secs / 3600);
                    else                      snprintf(b, sizeof(b), " %ldd ago", secs / 86400);
                    return std::string(b);
                  };

                  auto make_line = [](JsonObject obj) -> std::string {
                    std::string type = obj["type"] | "";
                    std::string label;
                    if (type == "WorkflowRunEvent") {
                      std::string status = obj["payload"]["workflow_run"]["status"] | "";
                      std::string concl  = obj["payload"]["workflow_run"]["conclusion"] | "";
                      if (status == "completed") {
                        if (concl == "success")        label = "CI OK";
                        else if (concl == "failure")   label = "CI FAIL";
                        else if (concl == "cancelled") label = "CI X";
                        else if (concl == "skipped")   label = "CI -";
                        else                           label = "CI ?";
                      } else if (status == "in_progress") {
                        label = "CI RUN";
                      } else {
                        label = "CI Q";
                      }
                    } else if (type == "CheckRunEvent") {
                      std::string status = obj["payload"]["check_run"]["status"] | "";
                      std::string concl  = obj["payload"]["check_run"]["conclusion"] | "";
                      if (status == "completed")
                        label = (concl == "success") ? "Check OK" :
                                (concl == "failure") ? "Check FAIL" : "Check ?";
                      else
                        label = "Check RUN";
                    } else if (type == "PushEvent")            label = "Push";
                    else if (type == "PullRequestEvent")       label = "PR";
                    else if (type == "PullRequestReviewEvent") label = "Review";
                    else if (type == "IssuesEvent")            label = "Issue";
                    else if (type == "IssueCommentEvent")      label = "Comment";
                    else if (type == "WatchEvent")             label = "Star";
                    else if (type == "CreateEvent") {
                      std::string rt = obj["payload"]["ref_type"] | "";
                      label = rt.empty() ? "Create" : ("New " + rt);
                    } else if (type == "DeleteEvent") {
                      std::string rt = obj["payload"]["ref_type"] | "";
                      label = rt.empty() ? "Delete" : ("Deleted " + rt);
                    }
                    else if (type == "ForkEvent")              label = "Fork";
                    else if (type == "ReleaseEvent")           label = "Release";
                    else if (type.size() > 10)                 label = type.substr(0, 10);
                    else                                       label = type;
                    return label;
                  };

                  // Second line: repo, and where useful the branch/ref/number
                  auto make_detail = [](JsonObject obj) -> std::string {
                    std::string type = obj["type"] | "";
                    std::string repo = obj["repo"]["name"] | "";
                    auto slash = repo.find('/');
                    std::string short_repo = (slash == std::string::npos) ? repo : repo.substr(slash + 1);
                    if (short_repo.size() > 22) short_repo = short_repo.substr(0, 22);

                    std::string extra;
                    if (type == "PushEvent" || type == "CreateEvent" || type == "DeleteEvent") {
                      std::string ref = obj["payload"]["ref"] | "";
                      // strip refs/heads/ or refs/tags/
                      if (ref.rfind("refs/heads/", 0) == 0) ref = ref.substr(11);
                      else if (ref.rfind("refs/tags/", 0) == 0) ref = ref.substr(10);
                      if (!ref.empty()) {
                        if (ref.size() > 18) ref = ref.substr(0, 18);
                        extra = ref;
                      }
                    } else if (type == "PullRequestEvent" || type == "PullRequestReviewEvent") {
                      int n = obj["payload"]["pull_request"]["number"] | 0;
                      if (n > 0) { char b[12]; sprintf(b, "#%d", n); extra = b; }
                    } else if (type == "IssuesEvent" || type == "IssueCommentEvent") {
                      int n = obj["payload"]["issue"]["number"] | 0;
                      if (n > 0) { char b[12]; sprintf(b, "#%d", n); extra = b; }
                    }
                    if (!extra.empty()) return extra + "  " + short_repo;
                    return short_repo;
                  };

                  // tally CI outcomes across the whole page
                  int running = 0, succ = 0, fail = 0;
                  for (JsonObject ev : arr) {
                    std::string type = ev["type"] | "";
                    if (type == "WorkflowRunEvent") {
                      std::string status = ev["payload"]["workflow_run"]["status"] | "";
                      std::string concl  = ev["payload"]["workflow_run"]["conclusion"] | "";
                      if (status == "completed") {
                        if (concl == "success") succ++;
                        else if (concl == "failure") fail++;
                      } else {
                        running++;
                      }
                    }
                  }
                  // On firmware variants where fetch_workflow_runs is
                  // authoritative (the S3), skip this per-page tally
                  // so we don't briefly overwrite real aggregates
                  // every minute. The assignment is compiled out when
                  // workflow_runs_enabled is "true".
                  if (!${workflow_runs_enabled}) {
                    id(ci_running) = running;
                    id(ci_success) = succ;
                    id(ci_failed)  = fail;
                    ESP_LOGI("github", "ci tally from events page: run=%d ok=%d fail=%d",
                             running, succ, fail);
                  }

                  // Active-repo tracker: every push/PR event upserts
                  // its repo.name with the event's created_at epoch
                  // (falling back to 'now' if parsing fails). The S3
                  // firmware consumes this in fetch_workflow_runs to
                  // poll real GitHub Actions state for each recently
                  // active repo. Harmless on the Plus 1.1 where the
                  // CI UI is compiled out.
                  {
                    auto now = id(sntp_time).now();
                    uint32_t now_ts = now.is_valid() ? (uint32_t) now.timestamp : 0;
                    for (JsonObject ev : arr) {
                      std::string t = ev["type"] | "";
                      if (t != "PushEvent" && t != "PullRequestEvent") continue;
                      const char *rn = ev["repo"]["name"] | (const char *) nullptr;
                      if (!rn || !*rn) continue;
                      std::string name(rn);
                      // Parse created_at so late-arriving events don't
                      // bump an older repo ahead of newer activity.
                      uint32_t seen_ts = now_ts;
                      int Y, M, D, h, mi, s;
                      const char *ca = ev["created_at"] | "";
                      if (sscanf(ca, "%d-%d-%dT%d:%d:%dZ",
                                 &Y, &M, &D, &h, &mi, &s) == 6) {
                        int yy = Y - (M <= 2);
                        int era = (yy >= 0 ? yy : yy - 399) / 400;
                        unsigned yoe = (unsigned)(yy - era * 400);
                        unsigned doy = (153u * ((unsigned)(M > 2 ? M - 3 : M + 9)) + 2u) / 5u
                                       + (unsigned) D - 1u;
                        unsigned doe = yoe * 365u + yoe / 4u - yoe / 100u + doy;
                        long days = (long) era * 146097L + (long) doe - 719468L;
                        seen_ts = (uint32_t)(days * 86400L + h * 3600 + mi * 60 + s);
                      }
                      bool found = false;
                      for (size_t i = 0; i < id(active_repo_names).size(); i++) {
                        if (id(active_repo_names)[i] == name) {
                          if (seen_ts > id(active_repo_seen)[i]) {
                            id(active_repo_seen)[i] = seen_ts;
                          }
                          found = true;
                          break;
                        }
                      }
                      if (!found) {
                        id(active_repo_names).push_back(name);
                        id(active_repo_seen).push_back(seen_ts);
                      }
                    }
                    ESP_LOGI("github", "active repos tracked: %d",
                             (int) id(active_repo_names).size());
                  }

                  int count = arr.size();
                  ESP_LOGI("github", "user events fetched: %d event(s) on page", count);

                  auto is_copilot = [](const char *s) -> bool {
                    if (!s) return false;
                    std::string v(s);
                    for (auto &c : v) c = std::tolower(c);
                    return v.find("copilot") != std::string::npos;
                  };
                  auto event_has_copilot = [&](JsonObject ev) -> bool {
                    if (is_copilot(ev["actor"]["login"] | (const char*)nullptr)) return true;
                    std::string t = ev["type"] | "";
                    if (t == "PullRequestEvent" || t == "PullRequestReviewEvent") {
                      if (is_copilot(ev["payload"]["pull_request"]["user"]["login"] | (const char*)nullptr)) return true;
                      JsonArray rr = ev["payload"]["pull_request"]["requested_reviewers"].as<JsonArray>();
                      if (!rr.isNull()) {
                        for (JsonObject r : rr) {
                          if (is_copilot(r["login"] | (const char*)nullptr)) return true;
                        }
                      }
                      if (is_copilot(ev["payload"]["review"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "IssueCommentEvent" || t == "PullRequestReviewCommentEvent") {
                      if (is_copilot(ev["payload"]["comment"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "IssuesEvent") {
                      if (is_copilot(ev["payload"]["issue"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "WorkflowRunEvent") {
                      if (is_copilot(ev["payload"]["workflow_run"]["actor"]["login"] | (const char*)nullptr)) return true;
                      if (is_copilot(ev["payload"]["workflow_run"]["triggering_actor"]["login"] | (const char*)nullptr)) return true;
                    }
                    return false;
                  };

                  // Collect events newer than last_top_event_id (top-down, stop on match).
                  // On first fetch, load only the top event so the user sees proof of life.
                  std::string old_last = id(last_top_event_id);
                  bool first_fetch = old_last.empty();
                  std::string new_top;
                  std::vector<std::string> new_lines;
                  std::vector<std::string> new_detail;
                  std::vector<uint8_t> new_copilot;
                  std::vector<uint8_t> new_ci_fail;
                  int limit = first_fetch ? 1 : count;
                  if (first_fetch) {
                    ESP_LOGI("github", "first fetch since boot: loading only top event as proof-of-life");
                  }
                  // GitHub's /users/{user}/events is NOT strictly sorted
                  // by created_at across event categories - e.g. Dependabot
                  // PR-assignments get clustered ahead of newer pushes.
                  // Sort a local index by created_at desc so "top" always
                  // means "newest".
                  std::vector<int> order;
                  order.reserve(count);
                  for (int i = 0; i < count; i++) order.push_back(i);
                  std::sort(order.begin(), order.end(),
                            [&](int a, int b) {
                              const char *ca = arr[a]["created_at"] | "";
                              const char *cb = arr[b]["created_at"] | "";
                              return strcmp(ca, cb) > 0;  // ISO8601 sorts lexicographically
                            });
                  int n_push = 0, n_pr = 0, n_review = 0, n_wf = 0, n_check = 0, n_issue = 0, n_other = 0;
                  for (int oi = 0; oi < limit; oi++) {
                    int i = order[oi];
                    JsonObject ev = arr[i].as<JsonObject>();
                    std::string evid = ev["id"] | "";
                    if (oi == 0) new_top = evid;
                    if (!first_fetch && !evid.empty() && evid == old_last) break;
                    std::string line = make_line(ev);
                    line += age_suffix(ev["created_at"] | (const char*)nullptr);
                    std::string detail = make_detail(ev);
                    bool cp = event_has_copilot(ev);
                    std::string t = ev["type"] | "";
                    std::string c = ev["payload"]["workflow_run"]["conclusion"] | "";
                    bool is_fail = (t == "WorkflowRunEvent" && c == "failure");
                    if      (t == "PushEvent")                 n_push++;
                    else if (t == "PullRequestEvent")          n_pr++;
                    else if (t == "PullRequestReviewEvent" ||
                             t == "PullRequestReviewCommentEvent") n_review++;
                    else if (t == "WorkflowRunEvent")          n_wf++;
                    else if (t == "CheckRunEvent")             n_check++;
                    else if (t == "IssuesEvent" ||
                             t == "IssueCommentEvent")         n_issue++;
                    else                                        n_other++;
                    ESP_LOGI("github",
                             "  new event[%d]: id=%s type=%s line='%s' detail='%s' copilot=%d ci_fail=%d",
                             i, evid.c_str(), t.c_str(), line.c_str(), detail.c_str(),
                             cp ? 1 : 0, is_fail ? 1 : 0);
                    new_lines.push_back(line);
                    new_detail.push_back(detail);
                    new_copilot.push_back(cp ? 1 : 0);
                    new_ci_fail.push_back(is_fail ? 1 : 0);
                  }
                  if (!new_top.empty()) id(last_top_event_id) = new_top;

                  // new_lines is already in created_at desc order (newest first)
                  // because order[] was sorted by created_at desc above.
                  // carousel_idx starts at 0 and advances, so slide 0 is the
                  // newest event — exactly the desired display order.
                  if (!new_lines.empty()) {
                    id(carousel_lines) = new_lines;
                    id(carousel_detail) = new_detail;
                    id(carousel_copilot) = new_copilot;
                    id(carousel_ci_fail) = new_ci_fail;
                    id(carousel_idx) = 0;
                    id(carousel_frames) = 20;  // 5s on first slide
                    // Events mode timer: at least 3 min, or enough to show all slides once
                    int n = (int) new_lines.size();
                    int needed = n * 20 + 40;
                    const int three_min = 720;
                    id(idle_frames) = needed > three_min ? needed : three_min;
                    bool any_fail = false;
                    for (auto f : new_ci_fail) if (f) { any_fail = true; break; }
                    id(pending_beep) = true;
                    id(pending_beep_fail) = any_fail;
                    ESP_LOGI("github",
                             "carousel loaded: %d slide(s) [push=%d pr=%d review=%d wf=%d check=%d issue=%d other=%d] ci_fail=%d events_window=%ds",
                             n, n_push, n_pr, n_review, n_wf, n_check, n_issue, n_other,
                             any_fail ? 1 : 0, id(idle_frames) / 4);
                  } else {
                    ESP_LOGI("github", "no new events since last fetch (last_top=%s)",
                             old_last.c_str());
                  }
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "user_events done body=%u heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(),
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }
              # Wake the screen if we were asleep, so the event is seen.
              - script.execute: apply_screen_power
              - if:
                  condition:
                    lambda: 'return id(pending_beep) && id(pending_beep_fail);'
                  then:
                    - lambda: 'id(pending_beep) = false;'
                    - script.execute: play_beep_fail
              - if:
                  condition:
                    lambda: 'return id(pending_beep) && !id(pending_beep_fail);'
                  then:
                    - lambda: 'id(pending_beep) = false;'
                    - script.execute: play_beep_ping

  # GitHub Actions workflow-run aggregator. Iterates the active_repo
  # tracker (populated by fetch_user_events from push/PR events),
  # prunes entries older than active_repo_window_minutes, caps the
  # list at active_repo_cap, then fetches
  # /repos/:owner/:name/actions/runs?per_page=5 for each remaining
  # repo and tallies status across them. The result overwrites
  # ci_running/ci_success/ci_failed. Only wired up on firmware
  # variants where workflow_runs_enabled is "true" (the S3).
  - id: fetch_workflow_runs
    mode: single
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "workflow_runs start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
          // Prune stale repos and cap the survivors at the newest
          // active_repo_cap entries (sorted by last-seen desc). This
          // is the only place we mutate the tracker vectors other
          // than the upsert in fetch_user_events, so resizing here
          // keeps memory bounded across long uptimes.
          auto now = id(sntp_time).now();
          uint32_t now_ts = now.is_valid() ? (uint32_t) now.timestamp : 0;
          const uint32_t window = ${active_repo_window_minutes} * 60u;
          std::vector<std::string> names;
          std::vector<uint32_t>    seen;
          for (size_t i = 0; i < id(active_repo_names).size(); i++) {
            uint32_t ts = id(active_repo_seen)[i];
            if (now_ts == 0 || now_ts - ts <= window) {
              names.push_back(id(active_repo_names)[i]);
              seen.push_back(ts);
            }
          }
          std::vector<size_t> order(names.size());
          for (size_t i = 0; i < order.size(); i++) order[i] = i;
          std::sort(order.begin(), order.end(),
                    [&](size_t a, size_t b) { return seen[a] > seen[b]; });
          const size_t cap = ${active_repo_cap};
          std::vector<std::string> top_names;
          std::vector<uint32_t>    top_seen;
          for (size_t i = 0; i < order.size() && top_names.size() < cap; i++) {
            top_names.push_back(names[order[i]]);
            top_seen.push_back(seen[order[i]]);
          }
          id(active_repo_names) = top_names;
          id(active_repo_seen)  = top_seen;
          id(wf_tmp_running) = 0;
          id(wf_tmp_success) = 0;
          id(wf_tmp_failed)  = 0;
          id(wf_cursor)      = 0;
          ESP_LOGI("github", "workflow_runs sweep: %d active repo(s)",
                   (int) top_names.size());
      - while:
          condition:
            lambda: 'return id(wf_cursor) < (int) id(active_repo_names).size();'
          then:
            - http_request.get:
                # per_page=3 + exclude_pull_requests=true + 48 KB buffer.
                # workflow_run objects are surprisingly fat (10-15 KB each with
                # embedded head_commit / head_repository / repository / actor /
                # pull_requests), so per_page=3 with a 32 KB buffer STILL
                # truncated mid-parse on repos with rich runs. exclude_pull_requests
                # is the biggest single lever (GitHub strips the pull_requests
                # array server-side, often 1-3 KB per run), and 48 KB buffer
                # gives enough headroom for 3 heavy runs. We only aggregate
                # status/conclusion counters from the response.
                url: !lambda 'return std::string("https://api.github.com/repos/") + id(active_repo_names)[id(wf_cursor)] + "/actions/runs?per_page=3&exclude_pull_requests=true";'
                max_response_buffer_size: 49152
                request_headers:
                  Authorization: "Bearer ${github_token}"
                  Accept: "application/vnd.github+json"
                  X-GitHub-Api-Version: "2022-11-28"
                  # Conditional GET. GitHub honours If-None-Match on workflow_runs
                  # and responds with 304 (empty body, no primary rate-limit cost)
                  # when the resource is unchanged, which is the common case at
                  # minute-spaced polling. Cold cache / first sweep sends a
                  # sentinel weak-etag that can never match a real resource, so
                  # we get a normal 200 + etag capture on the first call.
                  If-None-Match: !lambda |-
                    auto it = id(wf_etag).find(id(active_repo_names)[id(wf_cursor)]);
                    return it != id(wf_etag).end() ? it->second.c_str() : "W/\"none\"";
                # Pull Etag out of the response so we can replay it on the next
                # sweep. Names are lower-cased by http_request internally.
                collect_headers:
                  - etag
                capture_response: true
                on_error:
                  then:
                    - logger.log:
                        format: "workflow_runs fetch errored for active repo %d"
                        args: ['id(wf_cursor)']
                        level: WARN
                        tag: "github"
                on_response:
                  then:
                    - lambda: |-
                        const std::string &repo = id(active_repo_names)[id(wf_cursor)];
                        if (response->status_code == 304) {
                          // Unchanged since our cached etag. Reuse the prior
                          // per-repo counters (body is empty) so the aggregate
                          // stays correct without re-parsing.
                          auto rit = id(wf_cache_run).find(repo);
                          auto oit = id(wf_cache_ok).find(repo);
                          auto fit = id(wf_cache_fail).find(repo);
                          int r = rit != id(wf_cache_run).end()  ? rit->second : 0;
                          int s = oit != id(wf_cache_ok).end()   ? oit->second : 0;
                          int f = fit != id(wf_cache_fail).end() ? fit->second : 0;
                          id(wf_tmp_running) += r;
                          id(wf_tmp_success) += s;
                          id(wf_tmp_failed)  += f;
                          ESP_LOGI("github", "  %s: 304 cached run=%d ok=%d fail=%d",
                                   repo.c_str(), r, s, f);
                          return;
                        }
                        if (response->status_code != 200) {
                          ESP_LOGW("github", "workflow_runs HTTP %d for %s",
                                   response->status_code, repo.c_str());
                          return;
                        }
                        JsonDocument filter;
                        filter["workflow_runs"][0]["status"] = true;
                        filter["workflow_runs"][0]["conclusion"] = true;
                        JsonDocument doc;
                        DeserializationError err = deserializeJson(
                            doc, body, DeserializationOption::Filter(filter));
                        if (err) {
                          ESP_LOGW("github", "workflow_runs parse failed for %s: %s",
                                   repo.c_str(), err.c_str());
                          return;
                        }
                        JsonArray runs = doc["workflow_runs"].as<JsonArray>();
                        if (runs.isNull()) return;
                        int r = 0, s = 0, f = 0;
                        for (JsonObject run : runs) {
                          std::string status = run["status"] | "";
                          std::string concl  = run["conclusion"] | "";
                          if (status == "completed") {
                            if      (concl == "success")  s++;
                            else if (concl == "failure")  f++;
                          } else {
                            // queued / in_progress / pending / waiting
                            r++;
                          }
                        }
                        id(wf_tmp_running) += r;
                        id(wf_tmp_success) += s;
                        id(wf_tmp_failed)  += f;
                        // Remember per-repo counts so future 304s replay them.
                        id(wf_cache_run)[repo]  = r;
                        id(wf_cache_ok)[repo]   = s;
                        id(wf_cache_fail)[repo] = f;
                        std::string etag = response->get_response_header("etag");
                        if (!etag.empty()) {
                          id(wf_etag)[repo] = etag;
                        }
                        ESP_LOGI("github", "  %s: 200 run=%d ok=%d fail=%d etag=%s",
                                 repo.c_str(), r, s, f,
                                 etag.empty() ? "none" : "cached");
            # Space the per-repo requests out so we don't stack TLS
            # handshakes tight enough to starve the scheduler on a
            # busy board.
            - delay: 750ms
            - lambda: 'id(wf_cursor) += 1;'
      - lambda: |-
          id(ci_running) = id(wf_tmp_running);
          id(ci_success) = id(wf_tmp_success);
          id(ci_failed)  = id(wf_tmp_failed);
          ESP_LOGI("github", "workflow_runs aggregate: run=%d ok=%d fail=%d",
                   id(ci_running), id(ci_success), id(ci_failed));
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "workflow_runs done heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }

  # Copilot usage for the authenticated user. Pulls the current billing
  # cycle's usage items and sums anything where product == "Copilot".
  # Requires a fine-grained PAT with "Plan: read-only" (billing) access.
  - id: fetch_copilot_usage
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "copilot start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      - http_request.get:
          url: "https://api.github.com/users/${github_user}/settings/billing/usage"
          max_response_buffer_size: 16384
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(copilot_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(copilot_retry_pending) = true;'
                  - logger.log:
                      format: "copilot usage fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_copilot_usage
                else:
                  - logger.log:
                      format: "copilot usage fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(copilot_retry_pending) = false;'
              - lambda: |-
                  int sc = response->status_code;
                  if (sc != 200) {
                    if (sc == 401 || sc == 403 || sc == 404) {
                      id(copilot_disabled) = true;
                      ESP_LOGW("github", "copilot usage HTTP %d - disabled until reboot (org-billed account?)", sc);
                    } else {
                      ESP_LOGW("github", "copilot usage HTTP %d", sc);
                    }
                    return;
                  }
                  // Filter - keep only the fields we sum over.
                  JsonDocument filter;
                  filter["usageItems"][0]["product"] = true;
                  filter["usageItems"][0]["sku"] = true;
                  filter["usageItems"][0]["quantity"] = true;
                  filter["usageItems"][0]["netAmount"] = true;
                  filter["usageItems"][0]["unitType"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "copilot usage parse failed: %s", err.c_str());
                    return;
                  }
                  JsonArray items = doc["usageItems"].as<JsonArray>();
                  if (items.isNull()) {
                    // Some accounts return an empty response; treat as zero usage.
                    id(copilot_qty) = 0.0f;
                    id(copilot_net) = 0.0f;
                    id(copilot_sku) = "";
                    id(copilot_ok) = true;
                    ESP_LOGD("github", "copilot usage: no items");
                    return;
                  }

                  float qty = 0.0f;
                  float net = 0.0f;
                  std::string primary_sku;
                  int primary_count = 0;
                  for (JsonObject it : items) {
                    std::string product = it["product"] | "";
                    // Case-insensitive match on "copilot"
                    std::string p = product;
                    for (auto &c : p) c = std::tolower(c);
                    if (p.find("copilot") == std::string::npos) continue;
                    float q = it["quantity"] | 0.0f;
                    float n = it["netAmount"] | 0.0f;
                    qty += q;
                    net += n;
                    std::string sku = it["sku"] | "";
                    if (!sku.empty() && (primary_sku.empty() || q > primary_count)) {
                      primary_sku = sku;
                      primary_count = (int) q;
                    }
                  }
                  // Shorten SKU for display (e.g. strip leading "Copilot ")
                  if (primary_sku.rfind("Copilot ", 0) == 0) {
                    primary_sku = primary_sku.substr(8);
                  }
                  if (primary_sku.size() > 22) primary_sku = primary_sku.substr(0, 22);

                  id(copilot_qty) = qty;
                  id(copilot_net) = net;
                  id(copilot_sku) = primary_sku;
                  id(copilot_ok) = true;
                  ESP_LOGI("github", "copilot usage: qty=%.2f net=%.2f sku=%s",
                           qty, net, primary_sku.c_str());
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "copilot done body=%u heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(),
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }

  # GraphQL (part 1 of 2): contributions (commits/PRs/reviews/issues)
  # for today, this week and this year. Small and fast (~300-500ms).
  # On success it chains into fetch_stats_search to pick up the
  # Elasticsearch-backed search() counts separately - doing all 9
  # operations in one request was taking 4+ seconds and tripping the
  # task watchdog.
  - id: fetch_stats_graphql
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "stats_graphql start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      - http_request.post:
          url: "https://api.github.com/graphql"
          max_response_buffer_size: 8192
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            Content-Type: "application/json"
          body: !lambda |-
            auto now = id(sntp_time).now();
            std::string day_start, week_start;
            if (now.is_valid()) {
              // Compute the UTC instant of local midnight today, and
              // of local Monday midnight, and emit each as an ISO-8601
              // UTC timestamp. Using gmtime_r's actual H/M/S (rather
              // than a hardcoded "T00:00:00Z") keeps the TODAY/WEEK
              // boundaries aligned with the user's local calendar even
              // in non-UTC timezones (e.g. Europe/London / BST), where
              // local midnight is not UTC midnight.
              time_t d_t = now.timestamp -
                           (now.hour * 3600 + now.minute * 60 + now.second);
              struct tm dt; gmtime_r(&d_t, &dt);
              char db[24]; snprintf(db, sizeof(db), "%04d-%02d-%02dT%02d:%02d:%02dZ",
                                    dt.tm_year + 1900, dt.tm_mon + 1, dt.tm_mday,
                                    dt.tm_hour, dt.tm_min, dt.tm_sec);
              day_start = db;
              // Week starts Monday (local).
              int dow = now.day_of_week;  // 1=Sun..7=Sat (ESPHome convention)
              int back = (dow == 1) ? 6 : (dow - 2);
              time_t t = now.timestamp - (back * 86400) -
                         (now.hour * 3600 + now.minute * 60 + now.second);
              struct tm wt; gmtime_r(&t, &wt);
              char wb[24]; snprintf(wb, sizeof(wb), "%04d-%02d-%02dT%02d:%02d:%02dZ",
                                    wt.tm_year + 1900, wt.tm_mon + 1, wt.tm_mday,
                                    wt.tm_hour, wt.tm_min, wt.tm_sec);
              week_start = wb;
              // The YEAR column uses GitHub's default contributionsCollection
              // window (exactly 1 year ending now) by omitting `from:` from
              // the year sub-query — matches fetch_cal_graphql's window and
              // avoids any risk of tripping GitHub's 1-year window cap.
            } else {
              day_start = "2026-01-01T00:00:00Z";
              week_start = "2026-01-01T00:00:00Z";
            }

            // Use `viewer` rather than `user(login:...)` so we see the
            // token owner's full contribution data (private + org repos
            // the token can see), regardless of the "Include private
            // contributions on my profile" setting.
            // Note: \044 is octal for '$' — keeps the literal '$' out of the
            // YAML source so ESPHome's substitution parser doesn't warn about
            // "undefined variable" for GraphQL query variables.
            std::string q =
              "query(\044dayStart:DateTime!, \044weekStart:DateTime!) {"
              "  today: viewer{ contributionsCollection(from:\044dayStart){ totalCommitContributions totalPullRequestContributions totalPullRequestReviewContributions totalIssueContributions } }"
              "  week:  viewer{ contributionsCollection(from:\044weekStart){ totalCommitContributions totalPullRequestContributions totalPullRequestReviewContributions totalIssueContributions } }"
              "  year:  viewer{ contributionsCollection{ totalCommitContributions totalPullRequestContributions } }"
              "}";

            std::string body;
            body.reserve(1024);
            body += "{\"query\":\"";
            for (char c : q) { if (c == '"') body += "\\\""; else body += c; }
            body += "\",\"variables\":{";
            body += "\"dayStart\":\"" + day_start + "\",";
            body += "\"weekStart\":\"" + week_start + "\"";
            body += "}}";
            return body;
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(stats_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(stats_retry_pending) = true;'
                  - logger.log:
                      format: "stats graphql fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_stats_graphql
                else:
                  - logger.log:
                      format: "stats graphql fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(stats_retry_pending) = false;'
              - lambda: |-
                  int sc = response->status_code;
                  if (sc != 200) {
                    ESP_LOGW("github", "stats graphql HTTP %d", sc);
                    if (sc == 401 || sc == 403 || sc == 404) {
                      id(stats_disabled) = true;
                      ESP_LOGW("github", "stats disabled until reboot (token rejected)");
                    }
                    return;
                  }
                  JsonDocument filter;
                  filter["data"]["today"]["contributionsCollection"]["totalCommitContributions"] = true;
                  filter["data"]["today"]["contributionsCollection"]["totalPullRequestContributions"] = true;
                  filter["data"]["today"]["contributionsCollection"]["totalPullRequestReviewContributions"] = true;
                  filter["data"]["today"]["contributionsCollection"]["totalIssueContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalCommitContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalPullRequestContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalPullRequestReviewContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalIssueContributions"] = true;
                  filter["data"]["year"]["contributionsCollection"]["totalCommitContributions"] = true;
                  filter["data"]["year"]["contributionsCollection"]["totalPullRequestContributions"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "stats graphql parse failed: %s", err.c_str());
                    return;
                  }
                  auto t = doc["data"]["today"]["contributionsCollection"];
                  auto w = doc["data"]["week"]["contributionsCollection"];
                  auto y = doc["data"]["year"]["contributionsCollection"];

                  id(commits_today) = t["totalCommitContributions"] | 0;
                  id(commits_week)  = w["totalCommitContributions"] | 0;
                  id(commits_year) = y["totalCommitContributions"] | 0;
                  id(prs_today)    = t["totalPullRequestContributions"] | 0;
                  id(prs_week)     = w["totalPullRequestContributions"] | 0;
                  id(prs_year)     = y["totalPullRequestContributions"] | 0;
                  id(reviews_week) = w["totalPullRequestReviewContributions"] | 0;
                  id(issues_week)  = w["totalIssueContributions"] | 0;

                  id(stats_ok) = true;
                  ESP_LOGI("github",
                           "stats contrib: c(d/w/y)=%d/%d/%d prs(d/w/y)=%d/%d/%d reviews_wk=%d issues_wk=%d",
                           id(commits_today), id(commits_week), id(commits_year),
                           id(prs_today), id(prs_week), id(prs_year),
                           id(reviews_week), id(issues_week));
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "stats_graphql done body=%u heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(),
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }
              # Chain the search aggregate. 2s gap lets the network
              # stack breathe and the display interval catch up.
              - if:
                  condition:
                    lambda: 'return id(stats_search_enabled);'
                  then:
                    - delay: 2s
                    - script.execute: fetch_stats_search

  # GraphQL (part 2 of 2): the six search() aliases (open/merged PRs,
  # review-requested PRs, assigned/authored/closed issues). Split out
  # from fetch_stats_graphql because search() is ES-backed on GitHub's
  # side and multiple of them in one doc add up to several seconds.
  - id: fetch_stats_search
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "stats_search start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      - http_request.post:
          url: "https://api.github.com/graphql"
          max_response_buffer_size: 8192
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            Content-Type: "application/json"
          body: !lambda |-
            auto pad2 = [](int v) {
              char b[4]; snprintf(b, sizeof(b), "%02d", v); return std::string(b);
            };
            auto now = id(sntp_time).now();
            std::string merged_week, open_q, review_q;
            std::string issues_assigned_q, issues_authored_q, issues_closed_q;
            if (now.is_valid()) {
              // Monday-of-this-week date in LOCAL calendar terms. GitHub
              // search date qualifiers (merged:>=, closed:>=) are date-only
              // and are interpreted in the token owner's GitHub-configured
              // timezone, so this is a best-effort approximation. Computing
              // from local Y/M/D (normalized via mktime) keeps the boundary
              // aligned with the user's local Monday rather than with a
              // UTC-shifted day (which in BST backdated it to Sunday).
              int dow = now.day_of_week;  // 1=Sun..7=Sat
              int back = (dow == 1) ? 6 : (dow - 2);
              struct tm lt = {};
              lt.tm_year = now.year - 1900;
              lt.tm_mon  = now.month - 1;
              lt.tm_mday = now.day_of_month - back;
              lt.tm_hour = 0; lt.tm_min = 0; lt.tm_sec = 0;
              lt.tm_isdst = -1;
              mktime(&lt);  // normalizes out-of-range tm_mday
              char mb[16]; snprintf(mb, sizeof(mb), "%04d-%02d-%02d",
                                    lt.tm_year + 1900, lt.tm_mon + 1, lt.tm_mday);
              merged_week = std::string("is:pr author:") + "${github_user}" +
                            " is:merged merged:>=" + mb;
              issues_closed_q = std::string("is:issue author:") + "${github_user}" +
                                " is:closed closed:>=" + mb;
            } else {
              merged_week = std::string("is:pr author:") + "${github_user}" + " is:merged";
              issues_closed_q = std::string("is:issue author:") + "${github_user}" + " is:closed";
            }
            open_q  = std::string("is:pr author:") + "${github_user}" + " is:open";
            review_q = std::string("is:pr review-requested:") + "${github_user}" + " is:open";
            issues_assigned_q = std::string("is:issue assignee:") + "${github_user}" + " is:open";
            issues_authored_q = std::string("is:issue author:") + "${github_user}" + " is:open";

            // Note: \044 is octal for '$' — keeps the literal '$' out of the YAML
            // source so ESPHome's substitution parser doesn't warn.
            std::string q =
              "query(\044mergedWeek:String!, \044openQ:String!, \044reviewQ:String!, \044issuesAssignedQ:String!, \044issuesAuthoredQ:String!, \044issuesClosedQ:String!) {"
              "  merged:         search(query:\044mergedWeek,        type:ISSUE){ issueCount }"
              "  open:           search(query:\044openQ,             type:ISSUE){ issueCount }"
              "  review:         search(query:\044reviewQ,           type:ISSUE){ issueCount }"
              "  issuesAssigned: search(query:\044issuesAssignedQ,   type:ISSUE){ issueCount }"
              "  issuesAuthored: search(query:\044issuesAuthoredQ,   type:ISSUE){ issueCount }"
              "  issuesClosed:   search(query:\044issuesClosedQ,     type:ISSUE){ issueCount }"
              "}";

            std::string body;
            body.reserve(1536);
            body += "{\"query\":\"";
            for (char c : q) { if (c == '"') body += "\\\""; else body += c; }
            body += "\",\"variables\":{";
            body += "\"mergedWeek\":\"" + merged_week + "\",";
            body += "\"openQ\":\"" + open_q + "\",";
            body += "\"reviewQ\":\"" + review_q + "\",";
            body += "\"issuesAssignedQ\":\"" + issues_assigned_q + "\",";
            body += "\"issuesAuthoredQ\":\"" + issues_authored_q + "\",";
            body += "\"issuesClosedQ\":\""   + issues_closed_q   + "\"";
            body += "}}";
            return body;
          capture_response: true
          on_error:
            - logger.log:
                format: "stats search fetch failed, will retry next cycle"
                level: WARN
                tag: "github"
          on_response:
            then:
              - lambda: |-
                  int sc = response->status_code;
                  if (sc != 200) {
                    ESP_LOGW("github", "stats search HTTP %d", sc);
                    return;
                  }
                  JsonDocument filter;
                  filter["data"]["merged"]["issueCount"] = true;
                  filter["data"]["open"]["issueCount"] = true;
                  filter["data"]["review"]["issueCount"] = true;
                  filter["data"]["issuesAssigned"]["issueCount"] = true;
                  filter["data"]["issuesAuthored"]["issueCount"] = true;
                  filter["data"]["issuesClosed"]["issueCount"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "stats search parse failed: %s", err.c_str());
                    return;
                  }
                  id(prs_open)            = doc["data"]["open"]["issueCount"] | 0;
                  id(prs_merged_week)     = doc["data"]["merged"]["issueCount"] | 0;
                  id(prs_review_requested)= doc["data"]["review"]["issueCount"] | 0;
                  id(issues_assigned_open) = doc["data"]["issuesAssigned"]["issueCount"] | 0;
                  id(issues_authored_open) = doc["data"]["issuesAuthored"]["issueCount"] | 0;
                  id(issues_closed_week)   = doc["data"]["issuesClosed"]["issueCount"] | 0;

                  ESP_LOGI("github",
                           "stats search: open=%d merged=%d review=%d issues(assigned/authored/closed_wk)=%d/%d/%d",
                           id(prs_open), id(prs_merged_week), id(prs_review_requested),
                           id(issues_assigned_open), id(issues_authored_open), id(issues_closed_week));
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "stats_search done body=%u heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(),
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }

  # Calendar fetch - split from the main stats query because carrying
  # the full contribution calendar (5-6 weeks of day objects) in the
  # same response as the rest of the stats exhausts the ArduinoJson
  # heap mid-parse, leaving later days empty. In its own request it has
  # plenty of room.
  - id: fetch_cal_graphql
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "cal_graphql start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      - http_request.post:
          url: "https://api.github.com/graphql"
          max_response_buffer_size: 20480
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            Content-Type: "application/json"
          body: !lambda |-
            // Use the default (full-year, ending now) contribution
            // window. Passing a small `from:` window seems to zero-pad
            // the tail of the calendar on GitHub's side, which leaves
            // recent days looking empty.
            std::string body = "{\"query\":\"{ viewer { contributionsCollection {"
                               " contributionCalendar { weeks { contributionDays"
                               " { contributionCount weekday } } } } } }\"}";
            return body;
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(cal_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(cal_retry_pending) = true;'
                  - logger.log:
                      format: "cal graphql fetch failed, retrying in 10s"
                      level: WARN
                      tag: "github"
                  - delay: 10s
                  - script.execute: fetch_cal_graphql
                else:
                  - logger.log:
                      format: "cal graphql fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(cal_retry_pending) = false;'
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("github", "cal graphql HTTP %d", response->status_code);
                    return;
                  }
                  // Streaming text scan. ArduinoJson's filter-based
                  // parse can't hold the full 53-week response in its
                  // pool (~371 day objects) so later weeks come back
                  // as empty objects. The response shape is rigid,
                  // so we just walk the raw string and pull every
                  // "contributionCount":N / "weekday":N pair in order.
                  const std::string &s = body;
                  std::vector<uint8_t> counts;
                  std::vector<uint8_t> wdays;
                  size_t p = 0;
                  static const char KCC[] = "\"contributionCount\":";
                  static const char KWD[] = "\"weekday\":";
                  while (true) {
                    size_t cc = s.find(KCC, p);
                    if (cc == std::string::npos) break;
                    cc += sizeof(KCC) - 1;
                    int count = atoi(s.c_str() + cc);
                    size_t wd = s.find(KWD, cc);
                    if (wd == std::string::npos) break;
                    wd += sizeof(KWD) - 1;
                    int weekday = atoi(s.c_str() + wd);
                    counts.push_back(count > 255 ? 255 : (uint8_t) count);
                    wdays.push_back((uint8_t)(weekday & 7));
                    p = wd;
                  }
                  int n_total = (int) counts.size();
                  if (n_total == 0) {
                    ESP_LOGW("github", "cal: no days scanned from response");
                    return;
                  }
                  // Keep the last 42 days.
                  int first_wd = wdays.empty() ? 0 : wdays[0];
                  if ((int) counts.size() > 42) {
                    int drop = (int) counts.size() - 42;
                    counts.erase(counts.begin(), counts.begin() + drop);
                    first_wd = wdays[drop];
                  }
                  id(cal_counts) = counts;
                  id(cal_start_weekday) = first_wd;

                  int streak = 0;
                  int n = (int) counts.size();
                  int i = n - 1;
                  if (i >= 0 && counts[i] == 0) i--;
                  while (i >= 0 && counts[i] > 0) { streak++; i--; }
                  id(streak_days) = streak;

                  int best = 0;
                  int best_wd = -1;
                  int start = n - 7; if (start < 0) start = 0;
                  for (int j = start; j < n; j++) {
                    if (counts[j] > best) {
                      best = counts[j];
                      best_wd = (first_wd + j) % 7;
                    }
                  }
                  id(best_day_count) = best;
                  id(best_day_weekday) = best_wd;
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "cal_graphql done body=%u days=%d heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(), n_total,
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }



  # /rate_limit - free info: core API budget + any Copilot rate buckets
  # the account exposes. The copilot bucket only appears for accounts
  # where GitHub gates Copilot requests per-user.
  - id: fetch_rate_limit
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "rate_limit start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      - http_request.get:
          url: "https://api.github.com/rate_limit"
          max_response_buffer_size: 4096
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(ratelimit_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(ratelimit_retry_pending) = true;'
                  - logger.log:
                      format: "rate_limit fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_rate_limit
                else:
                  - logger.log:
                      format: "rate_limit fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(ratelimit_retry_pending) = false;'
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("github", "rate_limit HTTP %d", response->status_code);
                    return;
                  }
                  JsonDocument filter;
                  filter["resources"]["core"]["used"] = true;
                  filter["resources"]["core"]["limit"] = true;
                  filter["resources"]["core"]["reset"] = true;
                  filter["resources"]["copilot"]["used"] = true;
                  filter["resources"]["copilot"]["limit"] = true;
                  filter["resources"]["copilot"]["reset"] = true;
                  filter["resources"]["copilot_chat"]["used"] = true;
                  filter["resources"]["copilot_chat"]["limit"] = true;
                  filter["resources"]["copilot_chat"]["reset"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "rate_limit parse failed: %s", err.c_str());
                    return;
                  }
                  JsonObject res = doc["resources"].as<JsonObject>();
                  if (res.isNull()) return;

                  id(rl_core_used)  = res["core"]["used"]  | 0;
                  id(rl_core_limit) = res["core"]["limit"] | 0;
                  id(rl_core_reset) = res["core"]["reset"] | 0;

                  // Prefer the `copilot` bucket; fall back to `copilot_chat`.
                  if (!res["copilot"].isNull()) {
                    id(rl_copilot_used)  = res["copilot"]["used"]  | 0;
                    id(rl_copilot_limit) = res["copilot"]["limit"] | 0;
                    id(rl_copilot_reset) = res["copilot"]["reset"] | 0;
                  } else if (!res["copilot_chat"].isNull()) {
                    id(rl_copilot_used)  = res["copilot_chat"]["used"]  | 0;
                    id(rl_copilot_limit) = res["copilot_chat"]["limit"] | 0;
                    id(rl_copilot_reset) = res["copilot_chat"]["reset"] | 0;
                  } else {
                    id(rl_copilot_used) = -1;   // not exposed on this account
                  }
                  id(ratelimit_ok) = true;
                  ESP_LOGI("github", "rate_limit: core=%d/%d copilot=%d/%d",
                           id(rl_core_used), id(rl_core_limit),
                           id(rl_copilot_used), id(rl_copilot_limit));
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "rate_limit done body=%u heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(),
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }

  # Dependabot alerts: account-wide aggregation in a single REST call.
  # GET /user/dependabot/alerts returns the most recent OPEN alerts the
  # token can see across all repos — far cheaper than the previous
  # per-repo GraphQL fan-out, which pinned the main task long enough in
  # TLS to trip the idle-task watchdog on the S3. Requires
  # "Dependabot alerts: Read-only" (fine-grained PAT) or security_events
  # scope (classic PAT). On 401/403/404 the card is disabled for the
  # rest of the boot.
  - id: fetch_dependabot_alerts
    mode: restart
    then:
      - lambda: |-
          if (${debug_mem_logs_enabled}) {
            ESP_LOGI("mem", "dependabot start heap=%u int=%u/largest=%u psram=%u",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                     (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
          }
      # REST endpoint: account-wide alerts in one shot. Server aggregates
      # across all accessible repos; we only ask for the 10 most recent OPEN
      # alerts. Tiny, bounded response. Replaces the old GraphQL query that
      # enumerated 100 repos x vulnerabilityAlerts and pinned the main task
      # in TLS long enough to trip the idle-task watchdog.
      - http_request.get:
          url: "https://api.github.com/user/dependabot/alerts?state=open&per_page=10&sort=created&direction=desc"
          max_response_buffer_size: 8192
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(dependabot_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(dependabot_retry_pending) = true;'
                  - logger.log:
                      format: "dependabot fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_dependabot_alerts
                else:
                  - logger.log:
                      format: "dependabot fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(dependabot_retry_pending) = false;'
              - lambda: |-
                  int sc = response->status_code;
                  if (sc != 200) {
                    ESP_LOGW("github", "dependabot HTTP %d", sc);
                    // 404 here is expected when the user has zero open alerts visible
                    // (the /user/dependabot/alerts endpoint returns 404 instead of [] in that case).
                    // Treat it as transient: just skip this cycle and retry on the next interval.
                    if (sc == 401 || sc == 403) {
                      id(dependabot_disabled) = true;
                      ESP_LOGW("github", "dependabot disabled until reboot (token missing repo scope?)");
                    }
                    return;
                  }
                  // Filter: keep only the small subset of fields we render.
                  JsonDocument filter;
                  filter[0]["repository"]["full_name"] = true;
                  filter[0]["repository"]["name"] = true;
                  filter[0]["dependency"]["package"]["name"] = true;
                  filter[0]["security_advisory"]["severity"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "dependabot parse failed: %s", err.c_str());
                    return;
                  }
                  JsonArray alerts = doc.as<JsonArray>();
                  int returned = alerts.isNull() ? 0 : (int) alerts.size();
                  int crit = 0, high = 0, med = 0, low = 0;
                  std::string top_repo;
                  std::string top_severity;
                  if (returned > 0) {
                    for (JsonObject a : alerts) {
                      const char *sev = a["security_advisory"]["severity"] | "";
                      if (!strcmp(sev, "critical")) crit++;
                      else if (!strcmp(sev, "high")) high++;
                      else if (!strcmp(sev, "medium")) med++;
                      else if (!strcmp(sev, "low")) low++;
                    }
                    JsonObject first = alerts[0];
                    top_repo = first["repository"]["name"] | "";
                    top_severity = first["security_advisory"]["severity"] | "";
                  }
                  if (top_repo.size() > 22) top_repo = top_repo.substr(0, 22);
                  // Note: per_page=10 caps "open total" reporting at 10. Pagination
                  // via Link header is intentionally not parsed (saves heap + time).
                  // Scoreboard shows "10+" if we hit the cap.
                  id(dep_open_total) = returned;
                  id(dep_repos_affected) = returned;  // best-effort proxy without enumerating repos
                  id(dep_top_repo) = top_repo;
                  id(dep_top_repo_count) = returned;
                  id(dependabot_ok) = true;
                  ESP_LOGI("github", "dependabot: returned=%d crit=%d high=%d med=%d low=%d top=%s(%s)",
                           returned, crit, high, med, low,
                           top_repo.c_str(), top_severity.c_str());
                  if (${debug_mem_logs_enabled}) {
                    ESP_LOGI("mem", "dependabot done body=%u heap=%u int=%u/largest=%u psram=%u",
                             (unsigned) body.length(),
                             (unsigned) esp_get_free_heap_size(),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL),
                             (unsigned) heap_caps_get_free_size(MALLOC_CAP_SPIRAM));
                  }

