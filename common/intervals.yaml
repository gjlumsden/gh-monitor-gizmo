interval:
  - interval: 250ms
    then:
      - lambda: |-
          // Count down the temporary wake window started by a button press
          if (id(wake_frames) > 0) id(wake_frames) = id(wake_frames) - 1;

          // Count down events-mode timer; when it hits 0 drop back to idle
          if (id(idle_frames) > 0) {
            id(idle_frames) = id(idle_frames) - 1;
            if (id(idle_frames) == 0) {
              id(carousel_lines).clear();
              id(carousel_copilot).clear();
              id(carousel_ci_fail).clear();
              id(carousel_detail).clear();
              id(carousel_idx) = 0;
              id(carousel_frames) = 0;
              // Events window expired. Re-enter the idle UI for a
              // fresh set of carousel cycles so the user sees the
              // standard card rotation before the screen sleeps
              // again, rather than dropping straight to a black
              // panel.
              id(idle_ui_active) = true;
              id(carousel_cycle_anchor) = 0;
              const int max_cycles = ${idle_screen_off_cycles};
              id(carousel_cycles_left) = max_cycles > 0 ? max_cycles : 1;
              id(screensaver_frames) = 0;
              id(screensaver_cooldown) = 4 * ${idle_bouncer_seconds};
              id(pending_screen_update) = true;
            }
          }

          // Advance carousel slide
          if (!id(carousel_lines).empty()) {
            if (id(carousel_frames) > 0) {
              id(carousel_frames) = id(carousel_frames) - 1;
            }
            if (id(carousel_frames) == 0) {
              int n = (int) id(carousel_lines).size();
              id(carousel_idx) = (id(carousel_idx) + 1) % n;
              id(carousel_frames) = 20;  // ~5s per slide at 250ms tick
            }
          }

          // DVD-bouncer: advance only while idle AND the idle UI is active
          if (id(idle_frames) == 0 && id(idle_ui_active)) {
            const int W = 240, H = 135;
            const int GW = 52, GH = 64;
            const int TOP = 22;
            int x = id(gh_x) + id(gh_vx);
            int y = id(gh_y) + id(gh_vy);
            bool bounced = false;
            if (x <= 0)         { x = 0;         id(gh_vx) = -id(gh_vx); bounced = true; }
            else if (x >= W - GW) { x = W - GW; id(gh_vx) = -id(gh_vx); bounced = true; }
            if (y <= TOP)       { y = TOP;       id(gh_vy) = -id(gh_vy); bounced = true; }
            else if (y >= H - GH) { y = H - GH; id(gh_vy) = -id(gh_vy); bounced = true; }
            id(gh_x) = x;
            id(gh_y) = y;
            if (bounced) id(gh_color_idx) = (id(gh_color_idx) + 1) % 5;
          }

          // Idle flash cycle.
          //   events mode        -> preempts everything; reset flash state
          //   idle UI asleep     -> do nothing (backlight is off)
          //   showing card       -> screensaver_frames ticks down; at 0
          //                         -> bouncer
          //   bouncer            -> screensaver_cooldown ticks down; at 0
          //                         -> pick next card; if that closes a
          //                         full rotation, decrement
          //                         carousel_cycles_left and sleep the
          //                         UI when it hits zero.
          const int card_ticks    = 4 * ${idle_card_seconds};
          const int bouncer_ticks = 4 * ${idle_bouncer_seconds};
          if (id(idle_frames) > 0) {
            // Events are showing; reset flash state so we resume from
            // the bouncer once events clear. Leave idle_screen alone so
            // the rotation advances past the last-shown card next time.
            id(screensaver_frames) = 0;
            id(screensaver_cooldown) = bouncer_ticks;
          } else if (!id(idle_ui_active)) {
            // UI asleep - freeze the rotation counters
            id(screensaver_frames) = 0;
            id(screensaver_cooldown) = bouncer_ticks;
          } else if (id(screensaver_frames) > 0) {
            id(screensaver_frames) = id(screensaver_frames) - 1;
            if (id(screensaver_frames) == 0) {
              // Card window ended - back to bouncer. Keep idle_screen
              // as the last-shown card so the next pick advances in
              // the rotation.
              id(screensaver_cooldown) = bouncer_ticks;
            }
          } else {
            // Bouncer active; count down to next card flash
            if (id(screensaver_cooldown) > 0) {
              id(screensaver_cooldown) = id(screensaver_cooldown) - 1;
            }
            if (id(screensaver_cooldown) == 0) {
              // Pick the next available card from the rotation
              int screens[16];
              int n = 0;
              if (id(copilot_ok))   screens[n++] = 1;
              if (id(stats_ok))   { screens[n++] = 2; screens[n++] = 3; }
              if (${ci_enabled} && id(ci_running) + id(ci_success) + id(ci_failed) > 0) screens[n++] = 4;
              if (id(ratelimit_ok)) screens[n++] = 5;
              if (id(stats_ok) && id(streak_days) + id(best_day_count) > 0) screens[n++] = 6;
              if (id(stats_ok) && (id(issues_assigned_open) + id(issues_authored_open) + id(issues_closed_week) > 0)) screens[n++] = 7;
              if (id(stats_ok) && !id(cal_counts).empty()) { screens[n++] = 8; screens[n++] = 9; }
              if (id(dependabot_ok)) screens[n++] = 10;
              if (n == 0) {
                // Nothing to show yet - try again in ~10s
                id(screensaver_cooldown) = 40;
              } else {
                int cur = id(idle_screen);
                int next = screens[0];
                for (int i = 0; i < n; i++) {
                  if (screens[i] == cur) { next = screens[(i + 1) % n]; break; }
                }
                id(idle_screen) = next;
                id(screensaver_frames) = card_ticks;
                id(pending_card_beep) = true;

                // Cycle bookkeeping: anchor the first card of a fresh
                // cycle, then detect when we wrap back to it. Only
                // active when idle_screen_off_cycles > 0.
                const int max_cycles = ${idle_screen_off_cycles};
                if (max_cycles > 0) {
                  if (id(carousel_cycle_anchor) == 0) {
                    id(carousel_cycle_anchor) = next;
                  } else if (next == id(carousel_cycle_anchor)) {
                    // Full rotation complete
                    id(carousel_cycles_left) = id(carousel_cycles_left) - 1;
                    if (id(carousel_cycles_left) <= 0) {
                      id(idle_ui_active) = false;
                      id(carousel_cycle_anchor) = 0;
                      id(screensaver_frames) = 0;
                      id(pending_card_beep) = false;
                      id(pending_screen_update) = true;
                    }
                  }
                }
              }
            }
          }
      - if:
          condition:
            and:
              - lambda: 'return id(pending_card_beep);'
              - lambda: 'return ${card_beep_enabled};'
          then:
            - lambda: 'id(pending_card_beep) = false;'
            - script.execute: play_beep_card
          else:
            - lambda: 'id(pending_card_beep) = false;'
      - if:
          condition:
            lambda: 'return id(pending_screen_update);'
          then:
            - lambda: 'id(pending_screen_update) = false;'
            - script.execute: apply_screen_power

  - interval: 60s
    startup_delay: 30s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${user_events_enabled};'
          then:
            - lambda: 'id(user_retry_pending) = false;'
            - script.execute: fetch_user_events

  # GitHub Actions workflow-run aggregator. Runs 30 s after
  # fetch_user_events so the active-repo tracker has been populated
  # from the most recent events page. Only fires when
  # workflow_runs_enabled is "true" (the S3 firmware); on the
  # Plus 1.1 this compiles down to an unconditional-skip.
  - interval: 60s
    startup_delay: 50s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${workflow_runs_enabled};'
              - lambda: 'return id(idle_ui_active);'
          then:
            - script.execute: fetch_workflow_runs

  - interval: 600s
    startup_delay: 45s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${copilot_usage_enabled};'
              - lambda: 'return !id(copilot_disabled);'
              - lambda: 'return id(idle_ui_active);'
          then:
            - lambda: 'id(copilot_retry_pending) = false;'
            - script.execute: fetch_copilot_usage

  - interval: 600s
    startup_delay: 60s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${stats_enabled};'
              - lambda: 'return !id(stats_disabled);'
              - lambda: 'return id(idle_ui_active);'
          then:
            - lambda: 'id(stats_retry_pending) = false;'
            - script.execute: fetch_stats_graphql

  - interval: 900s
    startup_delay: 75s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${calendar_enabled};'
              - lambda: 'return id(idle_ui_active);'
          then:
            - lambda: 'id(cal_retry_pending) = false;'
            - script.execute: fetch_cal_graphql

  - interval: 600s
    startup_delay: 90s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${rate_limit_enabled};'
              - lambda: 'return id(idle_ui_active);'
          then:
            - lambda: 'id(ratelimit_retry_pending) = false;'
            - script.execute: fetch_rate_limit

  - interval: 900s
    startup_delay: 120s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return ${dependabot_enabled};'
              - lambda: 'return !id(dependabot_disabled);'
              - lambda: 'return id(idle_ui_active);'
          then:
            - lambda: 'id(dependabot_retry_pending) = false;'
            - script.execute: fetch_dependabot_alerts

  # Recompute night-mode state every 30 s. apply_screen_power also
  # runs on button press and on boot to sync backlight with state.
  - interval: 30s
    then:
      - script.execute: apply_screen_power

  # Liveness heartbeat. Logs uptime + free heap (and on the S3,
  # free PSRAM) every 30 s so that after a "previous boot" crash
  # we can see whether the device was leaking, fragmenting, or
  # otherwise unhealthy in the run-up to the fault.
  - interval: 30s
    startup_delay: 15s
    then:
      - lambda: |-
          uint32_t up = millis() / 1000;
          size_t heap_free = esp_get_free_heap_size();
          size_t heap_min  = esp_get_minimum_free_heap_size();
          size_t internal_free = heap_caps_get_free_size(MALLOC_CAP_INTERNAL);
          size_t internal_largest = heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL);
          // PSRAM caps return 0 on chips without it, so this line is
          // safe on the M5StickC Plus too.
          size_t psram_free = heap_caps_get_free_size(MALLOC_CAP_SPIRAM);
          ESP_LOGI("hb", "up=%us heap=%u min=%u int=%u/largest=%u psram=%u",
                   (unsigned) up, (unsigned) heap_free, (unsigned) heap_min,
                   (unsigned) internal_free, (unsigned) internal_largest,
                   (unsigned) psram_free);


  # Poll the PMIC every 1 s to publish is_charging. The register
  # address, I2C address and bitmask differ between devices (PM1 on
  # the S3 vs AXP192 on the Plus 1.1), so the device-specific bits
  # are passed in via substitutions. Read is non-blocking: on an I2C
  # bus error we just skip this tick rather than holding the lock.
  # The M5PM1 on the S3 is a derived-state register that can briefly
  # report a stale "5VIN connected" value immediately after reboot,
  # so the is_charging binary_sensor defines delayed_on/delayed_off
  # filters to require two consecutive agreeing reads before flipping.
  # startup_delay gives the PMIC time to settle before we poll it.
  - interval: 1s
    startup_delay: 3s
    then:
      - lambda: |-
          uint8_t reg = ${charger_read_reg};
          if (id(bus_a)->write(${charger_i2c_addr}, &reg, 1, false) != i2c::ERROR_OK) return;
          uint8_t val = 0;
          if (id(bus_a)->read(${charger_i2c_addr}, &val, 1) != i2c::ERROR_OK) return;
          id(is_charging).publish_state(${charger_is_present});
