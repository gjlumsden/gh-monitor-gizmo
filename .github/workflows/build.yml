name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build single-file YAMLs
        run: python build.py

      - name: Verify build is idempotent
        run: |
          python build.py
          git diff --exit-code -- dist/ || {
            echo 'build.py is not idempotent - dist/ differs between runs';
            exit 1;
          }

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ghmonitorgizmo-yaml
          path: dist/*.yaml
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build single-file YAMLs
        run: python build.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.yaml
          generate_release_notes: true
          body: |
            ## Install

            Download the YAML file for your hardware, paste it into Home
            Assistant's ESPHome Builder add-on as a new device config, edit
            the `substitutions:` block at the top (WiFi, IP, GitHub user),
            and install.

            | Device | File |
            |---|---|
            | M5StickC Plus 1.1 | `ghmonitorgizmo-cplus.yaml` |
