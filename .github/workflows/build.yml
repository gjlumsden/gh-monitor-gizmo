name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build single-file YAMLs
        run: python build.py

      - name: Verify build is idempotent
        run: |
          python build.py
          git diff --exit-code -- dist/ || {
            echo 'build.py is not idempotent - dist/ differs between runs';
            exit 1;
          }

      - name: Sanity-check dist/
        run: |
          count=$(ls dist/*.yaml | wc -l)
          if [ "$count" -ne 4 ]; then
            echo "expected 4 YAML files in dist/, found $count"
            ls -l dist/
            exit 1
          fi
          for f in dist/*.yaml; do
            size=$(stat -c%s "$f")
            if [ "$size" -lt 50000 ]; then
              echo "$f is suspiciously small: $size bytes"
              exit 1
            fi
          done

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ghmonitorgizmo-firmware
          path: dist/*.yaml
          if-no-files-found: error
