substitutions:
  rotate_display: "90"   # 90 or 270 for landscape; swap if upside-down
  github_user: !secret ghgizmo_github_user
  github_token: !secret ghgizmo_github_token

  # --- Night mode ---
  # Screen (backlight) is turned off between sleep_start_hour and
  # sleep_end_hour, local time. Button A wakes the screen for 15 s.
  # Set both values to the same number (e.g. 0) to disable night mode.
  sleep_start_hour: "20"   # off at 20:00
  sleep_end_hour:   "8"    # on  at 08:00
  # IANA timezone for the local-hour comparison above. Examples:
  #   "Europe/London"  "America/New_York"  "Asia/Tokyo"
  timezone: "Europe/London"

  # --- Networking (static IP) ---
  # To use DHCP instead, delete the `manual_ip:` block in `wifi:` below;
  # these substitutions then become unused and can be removed.
  static_ip: "192.168.4.10"
  gateway:   "192.168.4.1"
  subnet:    "255.255.255.0"
  dns1:      "1.1.1.1"
  dns2:      "8.8.8.8"

esphome:
  name: ghmonitorgizmo
  friendly_name: GH Monitor Gizmo

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      # Bootloader supports SRAM1 as IRAM on this chip; reclaim ~40KB
      # of code space. Silences the warning at boot.
      sram1_as_iram: true
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN: "4096"
      CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN: "16384"
      CONFIG_MBEDTLS_DYNAMIC_BUFFER: y
      CONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA: y
      CONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT: y

logger:
  level: WARN

api:
  encryption:
    key: !secret ghgizmo_api_encryption_key

ota:
  - platform: esphome
    password: !secret ghgizmo_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Static IP. Remove this whole `manual_ip:` block to use DHCP.
  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway}
    subnet: ${subnet}
    dns1: ${dns1}
    dns2: ${dns2}

  ap:
    ssid: "GH Monitor Gizmo"
    password: !secret ghgizmo_ap_password

http_request:
  useragent: "esphome-m5stick"
  timeout: 15s
  verify_ssl: false
  follow_redirects: true
  buffer_size_rx: 12288
  buffer_size_tx: 1024

# Time: used for the rate-limit reset countdown. SNTP is fire-and-forget;
# if the network is down the card just hides the countdown.
time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - "pool.ntp.org"
      - "time.cloudflare.com"

i2c:
  id: bus_a
  sda: GPIO21
  scl: GPIO22
  scan: true

# --- Buzzer on GPIO2 (M5StickC Plus) ---
output:
  - platform: ledc
    pin: GPIO2
    id: buzzer_out

rtttl:
  id: buzzer
  output: buzzer_out

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO37
      inverted: true
      mode:
        input: true
    name: "Button A"
    id: btn_a
    on_press:
      then:
        - lambda: |-
            // Dismiss: drop straight back to idle
            id(idle_frames) = 0;
            id(carousel_lines).clear();
            id(carousel_copilot).clear();
            id(carousel_ci_fail).clear();
            id(carousel_detail).clear();
            id(carousel_idx) = 0;
            id(carousel_frames) = 0;
            // Wake the screen for ~15 s if we're in night mode
            id(wake_frames) = 60;
        - script.execute: apply_screen_power

# --- FONTS ---
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto@700"
    id: font_med
    size: 18
  - file: "gfonts://Roboto@900"
    id: font_big
    size: 26
  # Material Design Icons - for the idle cycle and per-line icons
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_big
    size: 64
    glyphs:
      - "\U000F02A4"   # mdi:github
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_copilot
    size: 18
    glyphs:
      - "\U000F06A9"   # mdi:robot  (Copilot marker)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_copilot_big
    size: 40
    glyphs:
      - "\U000F06A9"   # mdi:robot (big Copilot card icon)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_status
    size: 14
    glyphs:
      - "\U000F0453"   # mdi:sync (running)
      - "\U000F012C"   # mdi:check (success)
      - "\U000F0156"   # mdi:close (failed)

globals:
  - id: last_top_event_id
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: user_retry_pending
    type: bool
    restore_value: no
    initial_value: 'false'

  # Copilot usage card
  - id: copilot_retry_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: copilot_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: copilot_qty
    type: float
    restore_value: no
    initial_value: '0.0f'
  - id: copilot_net
    type: float
    restore_value: no
    initial_value: '0.0f'
  - id: copilot_sku
    type: std::string
    restore_value: no
    initial_value: '""'

  # Permanent-disable flags. Flipped to true on the first 401/403/404 from
  # the endpoint, and cleared only on reboot. Stops log spam / wasted
  # requests for endpoints the current token isn't permitted to hit
  # (e.g. billing on Enterprise unlimited).
  - id: copilot_disabled
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: stats_disabled
    type: bool
    restore_value: no
    initial_value: 'false'

  # Contributions + PR stats (from GraphQL contributionsCollection + search)
  - id: stats_retry_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: stats_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: commits_today
    type: int
    restore_value: no
    initial_value: '0'
  - id: commits_week
    type: int
    restore_value: no
    initial_value: '0'
  - id: commits_year
    type: int
    restore_value: no
    initial_value: '0'
  - id: prs_today
    type: int
    restore_value: no
    initial_value: '0'
  - id: prs_week
    type: int
    restore_value: no
    initial_value: '0'
  - id: prs_year
    type: int
    restore_value: no
    initial_value: '0'
  - id: reviews_week
    type: int
    restore_value: no
    initial_value: '0'
  - id: issues_week
    type: int
    restore_value: no
    initial_value: '0'
  - id: prs_open
    type: int
    restore_value: no
    initial_value: '0'
  - id: prs_merged_week
    type: int
    restore_value: no
    initial_value: '0'
  - id: prs_review_requested
    type: int
    restore_value: no
    initial_value: '0'

  # Rate limit probe (GET /rate_limit) - free info: core budget remaining,
  # and Copilot buckets if the account exposes them.
  - id: ratelimit_retry_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ratelimit_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: rl_core_used
    type: int
    restore_value: no
    initial_value: '0'
  - id: rl_core_limit
    type: int
    restore_value: no
    initial_value: '0'
  - id: rl_core_reset
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: rl_copilot_used
    type: int
    restore_value: no
    initial_value: '-1'   # -1 = bucket not exposed on this account
  - id: rl_copilot_limit
    type: int
    restore_value: no
    initial_value: '0'
  - id: rl_copilot_reset
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Idle screen selection. The DVD bouncer (index 0) is the default;
  # every ~60s we flash one info card for ~10s and then return to the
  # bouncer. Index chosen at flash time among available cards:
  # 0 = DVD bouncer (always available),
  # 1 = copilot usage, 2 = contributions, 3 = PRs, 4 = CI, 5 = rate limit.
  - id: idle_screen
    type: int
    restore_value: no
    initial_value: '0'

  # Idle-screen flash cycle. The default idle screen is the DVD
  # bouncer. Every screensaver_cooldown ticks we pick the next
  # available info card and show it for screensaver_frames ticks,
  # then go back to the bouncer. Event mode preempts everything and
  # resets both counters.
  - id: screensaver_frames
    type: int
    restore_value: no
    initial_value: '0'        # 0 = bouncer; >0 = card currently flashed
  - id: screensaver_cooldown
    type: int
    restore_value: no
    initial_value: '120'      # first card after ~30s idle

  # CI tallies from the most recent page of events
  - id: ci_running
    type: int
    initial_value: '0'
  - id: ci_success
    type: int
    initial_value: '0'
  - id: ci_failed
    type: int
    initial_value: '0'

  # Carousel queue of new events since last fetch (oldest first)
  - id: carousel_lines
    type: std::vector<std::string>
    restore_value: no
  - id: carousel_detail
    type: std::vector<std::string>
    restore_value: no
  - id: carousel_copilot
    type: std::vector<uint8_t>
    restore_value: no
  - id: carousel_ci_fail
    type: std::vector<uint8_t>
    restore_value: no
  - id: carousel_idx
    type: int
    initial_value: '0'
  - id: carousel_frames
    type: int
    initial_value: '0'
  # Ticks remaining in "events mode"; 0 = show DVD bouncer idle screen
  - id: idle_frames
    type: int
    initial_value: '0'

  # Beep handoff from fetch lambda to the outer rtttl action
  - id: pending_beep
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pending_beep_fail
    type: bool
    restore_value: no
    initial_value: 'false'

  # Night mode: true while inside the sleep window, cleared by the
  # apply_screen_power script. wake_frames counts down in 250ms ticks
  # while a button-press temporarily overrides sleep.
  - id: screen_asleep
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: wake_frames
    type: int
    restore_value: no
    initial_value: '0'

  # DVD-bouncer github logo state
  - id: gh_x
    type: int
    initial_value: '20'
  - id: gh_y
    type: int
    initial_value: '40'
  - id: gh_vx
    type: int
    initial_value: '3'
  - id: gh_vy
    type: int
    initial_value: '2'
  - id: gh_color_idx
    type: int
    initial_value: '0'

interval:
  - interval: 250ms
    then:
      - lambda: |-
          // Count down the temporary wake window started by a button press
          if (id(wake_frames) > 0) id(wake_frames) = id(wake_frames) - 1;

          // Count down events-mode timer; when it hits 0 drop back to idle
          if (id(idle_frames) > 0) {
            id(idle_frames) = id(idle_frames) - 1;
            if (id(idle_frames) == 0) {
              id(carousel_lines).clear();
              id(carousel_copilot).clear();
              id(carousel_ci_fail).clear();
              id(carousel_detail).clear();
              id(carousel_idx) = 0;
              id(carousel_frames) = 0;
            }
          }

          // Advance carousel slide
          if (!id(carousel_lines).empty()) {
            if (id(carousel_frames) > 0) {
              id(carousel_frames) = id(carousel_frames) - 1;
            }
            if (id(carousel_frames) == 0) {
              int n = (int) id(carousel_lines).size();
              id(carousel_idx) = (id(carousel_idx) + 1) % n;
              id(carousel_frames) = 20;  // ~5s per slide at 250ms tick
            }
          }

          // DVD-bouncer: advance only while idle
          if (id(idle_frames) == 0) {
            const int W = 240, H = 135;
            const int GW = 52, GH = 64;
            const int TOP = 22;
            int x = id(gh_x) + id(gh_vx);
            int y = id(gh_y) + id(gh_vy);
            bool bounced = false;
            if (x <= 0)         { x = 0;         id(gh_vx) = -id(gh_vx); bounced = true; }
            else if (x >= W - GW) { x = W - GW; id(gh_vx) = -id(gh_vx); bounced = true; }
            if (y <= TOP)       { y = TOP;       id(gh_vy) = -id(gh_vy); bounced = true; }
            else if (y >= H - GH) { y = H - GH; id(gh_vy) = -id(gh_vy); bounced = true; }
            id(gh_x) = x;
            id(gh_y) = y;
            if (bounced) id(gh_color_idx) = (id(gh_color_idx) + 1) % 5;
          }

          // Idle flash cycle.
          //   events mode   -> preempts everything; reset flash state
          //   showing card  -> screensaver_frames ticks down; at 0 -> bouncer
          //   bouncer       -> screensaver_cooldown ticks down; at 0 -> pick
          //                    the next available card and show it for 10s
          //
          // End-to-end: 50s bouncer, 10s card, 50s bouncer, next card, ...
          if (id(idle_frames) > 0) {
            // Events are showing; reset flash state so we resume from
            // the bouncer once events clear.
            id(screensaver_frames) = 0;
            id(screensaver_cooldown) = 200;   // ~50s bouncer before first card
            id(idle_screen) = 0;
          } else if (id(screensaver_frames) > 0) {
            id(screensaver_frames) = id(screensaver_frames) - 1;
            if (id(screensaver_frames) == 0) {
              // Card window ended - back to bouncer for ~50s
              id(idle_screen) = 0;
              id(screensaver_cooldown) = 200;
            }
          } else {
            // Bouncer active; count down to next card flash
            if (id(screensaver_cooldown) > 0) {
              id(screensaver_cooldown) = id(screensaver_cooldown) - 1;
            }
            if (id(screensaver_cooldown) == 0) {
              // Pick the next available card from the rotation
              int screens[8];
              int n = 0;
              if (id(copilot_ok))   screens[n++] = 1;
              if (id(stats_ok))   { screens[n++] = 2; screens[n++] = 3; }
              if (id(ci_running) + id(ci_success) + id(ci_failed) > 0) screens[n++] = 4;
              if (id(ratelimit_ok)) screens[n++] = 5;
              if (n == 0) {
                // Nothing to show yet - try again in ~10s
                id(screensaver_cooldown) = 40;
              } else {
                int cur = id(idle_screen);
                int next = screens[0];
                for (int i = 0; i < n; i++) {
                  if (screens[i] == cur) { next = screens[(i + 1) % n]; break; }
                }
                id(idle_screen) = next;
                id(screensaver_frames) = 40;    // ~10s card flash
              }
            }
          }

  - interval: 60s
    startup_delay: 30s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: 'id(user_retry_pending) = false;'
            - script.execute: fetch_user_events

  - interval: 600s
    startup_delay: 45s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return !id(copilot_disabled);'
          then:
            - lambda: 'id(copilot_retry_pending) = false;'
            - script.execute: fetch_copilot_usage

  - interval: 600s
    startup_delay: 60s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return !id(stats_disabled);'
          then:
            - lambda: 'id(stats_retry_pending) = false;'
            - script.execute: fetch_stats_graphql

  - interval: 600s
    startup_delay: 90s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: 'id(ratelimit_retry_pending) = false;'
            - script.execute: fetch_rate_limit

  # Recompute night-mode state every 30 s. apply_screen_power also
  # runs on button press and on boot to sync backlight with state.
  - interval: 30s
    then:
      - script.execute: apply_screen_power

script:
  # Compute whether we should be asleep based on local hour and the
  # sleep_start_hour / sleep_end_hour substitutions, then enable or
  # disable the M5StickC Plus backlight (AXP192 LDO2, reg 0x12 bit 2).
  - id: apply_screen_power
    mode: restart
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          bool sleep = false;
          if (now.is_valid()) {
            int h = now.hour;
            const int s = ${sleep_start_hour};
            const int e = ${sleep_end_hour};
            if (s == e)      sleep = false;
            else if (s < e)  sleep = (h >= s && h < e);
            else             sleep = (h >= s || h < e);
          }
          id(screen_asleep) = sleep;
          bool want_on = !sleep || id(wake_frames) > 0 || id(idle_frames) > 0;

          // Toggle AXP192 LDO2 (backlight) via I2C: reg 0x12 bit 2
          uint8_t reg = 0x12;
          uint8_t v;
          if (id(bus_a)->write(0x34, &reg, 1, false) != i2c::ERROR_OK) return;
          if (id(bus_a)->read(0x34, &v, 1) != i2c::ERROR_OK) return;
          uint8_t nv = want_on ? (v | 0x04) : (v & ~0x04);
          if (nv != v) {
            uint8_t buf[2] = { 0x12, nv };
            id(bus_a)->write(0x34, buf, 2);
          }

  - id: fetch_user_events
    mode: restart
    then:
      - http_request.get:
          url: "https://api.github.com/users/${github_user}/events?per_page=6"
          max_response_buffer_size: 12288
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(user_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(user_retry_pending) = true;'
                  - logger.log:
                      format: "user events fetch failed, retrying in 10s"
                      level: WARN
                      tag: "github"
                  - delay: 10s
                  - script.execute: fetch_user_events
                else:
                  - logger.log:
                      format: "user events fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(user_retry_pending) = false;'
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("github", "user events HTTP %d", response->status_code);
                    return;
                  }
                  // Filter - keep only fields we use, so 30 events fit easily
                  JsonDocument filter;
                  filter[0]["id"] = true;
                  filter[0]["type"] = true;
                  filter[0]["repo"]["name"] = true;
                  filter[0]["actor"]["login"] = true;
                  filter[0]["payload"]["workflow_run"]["status"] = true;
                  filter[0]["payload"]["workflow_run"]["conclusion"] = true;
                  filter[0]["payload"]["workflow_run"]["actor"]["login"] = true;
                  filter[0]["payload"]["workflow_run"]["triggering_actor"]["login"] = true;
                  filter[0]["payload"]["check_run"]["status"] = true;
                  filter[0]["payload"]["check_run"]["conclusion"] = true;
                  filter[0]["payload"]["pull_request"]["user"]["login"] = true;
                  filter[0]["payload"]["pull_request"]["requested_reviewers"][0]["login"] = true;
                  filter[0]["payload"]["review"]["user"]["login"] = true;
                  filter[0]["payload"]["comment"]["user"]["login"] = true;
                  filter[0]["payload"]["issue"]["user"]["login"] = true;
                  filter[0]["payload"]["ref"] = true;
                  filter[0]["payload"]["ref_type"] = true;
                  filter[0]["payload"]["action"] = true;
                  filter[0]["payload"]["issue"]["number"] = true;
                  filter[0]["payload"]["pull_request"]["number"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "user json parse failed: %s", err.c_str());
                    return;
                  }
                  JsonArray arr = doc.as<JsonArray>();
                  if (arr.isNull()) return;

                  auto make_line = [](JsonObject obj) -> std::string {
                    std::string type = obj["type"] | "";
                    std::string label;
                    if (type == "WorkflowRunEvent") {
                      std::string status = obj["payload"]["workflow_run"]["status"] | "";
                      std::string concl  = obj["payload"]["workflow_run"]["conclusion"] | "";
                      if (status == "completed") {
                        if (concl == "success")        label = "CI OK";
                        else if (concl == "failure")   label = "CI FAIL";
                        else if (concl == "cancelled") label = "CI X";
                        else if (concl == "skipped")   label = "CI -";
                        else                           label = "CI ?";
                      } else if (status == "in_progress") {
                        label = "CI RUN";
                      } else {
                        label = "CI Q";
                      }
                    } else if (type == "CheckRunEvent") {
                      std::string status = obj["payload"]["check_run"]["status"] | "";
                      std::string concl  = obj["payload"]["check_run"]["conclusion"] | "";
                      if (status == "completed")
                        label = (concl == "success") ? "Check OK" :
                                (concl == "failure") ? "Check FAIL" : "Check ?";
                      else
                        label = "Check RUN";
                    } else if (type == "PushEvent")            label = "Push";
                    else if (type == "PullRequestEvent")       label = "PR";
                    else if (type == "PullRequestReviewEvent") label = "Review";
                    else if (type == "IssuesEvent")            label = "Issue";
                    else if (type == "IssueCommentEvent")      label = "Comment";
                    else if (type == "WatchEvent")             label = "Star";
                    else if (type == "CreateEvent") {
                      std::string rt = obj["payload"]["ref_type"] | "";
                      label = rt.empty() ? "Create" : ("New " + rt);
                    } else if (type == "DeleteEvent") {
                      std::string rt = obj["payload"]["ref_type"] | "";
                      label = rt.empty() ? "Delete" : ("Deleted " + rt);
                    }
                    else if (type == "ForkEvent")              label = "Fork";
                    else if (type == "ReleaseEvent")           label = "Release";
                    else if (type.size() > 10)                 label = type.substr(0, 10);
                    else                                       label = type;
                    return label;
                  };

                  // Second line: repo, and where useful the branch/ref/number
                  auto make_detail = [](JsonObject obj) -> std::string {
                    std::string type = obj["type"] | "";
                    std::string repo = obj["repo"]["name"] | "";
                    auto slash = repo.find('/');
                    std::string short_repo = (slash == std::string::npos) ? repo : repo.substr(slash + 1);
                    if (short_repo.size() > 22) short_repo = short_repo.substr(0, 22);

                    std::string extra;
                    if (type == "PushEvent" || type == "CreateEvent" || type == "DeleteEvent") {
                      std::string ref = obj["payload"]["ref"] | "";
                      // strip refs/heads/ or refs/tags/
                      if (ref.rfind("refs/heads/", 0) == 0) ref = ref.substr(11);
                      else if (ref.rfind("refs/tags/", 0) == 0) ref = ref.substr(10);
                      if (!ref.empty()) {
                        if (ref.size() > 18) ref = ref.substr(0, 18);
                        extra = ref;
                      }
                    } else if (type == "PullRequestEvent" || type == "PullRequestReviewEvent") {
                      int n = obj["payload"]["pull_request"]["number"] | 0;
                      if (n > 0) { char b[12]; sprintf(b, "#%d", n); extra = b; }
                    } else if (type == "IssuesEvent" || type == "IssueCommentEvent") {
                      int n = obj["payload"]["issue"]["number"] | 0;
                      if (n > 0) { char b[12]; sprintf(b, "#%d", n); extra = b; }
                    }
                    if (!extra.empty()) return extra + "  " + short_repo;
                    return short_repo;
                  };

                  // tally CI outcomes across the whole page
                  int running = 0, succ = 0, fail = 0;
                  for (JsonObject ev : arr) {
                    std::string type = ev["type"] | "";
                    if (type == "WorkflowRunEvent") {
                      std::string status = ev["payload"]["workflow_run"]["status"] | "";
                      std::string concl  = ev["payload"]["workflow_run"]["conclusion"] | "";
                      if (status == "completed") {
                        if (concl == "success") succ++;
                        else if (concl == "failure") fail++;
                      } else {
                        running++;
                      }
                    }
                  }
                  id(ci_running) = running;
                  id(ci_success) = succ;
                  id(ci_failed)  = fail;

                  int count = arr.size();

                  auto is_copilot = [](const char *s) -> bool {
                    if (!s) return false;
                    std::string v(s);
                    for (auto &c : v) c = std::tolower(c);
                    return v.find("copilot") != std::string::npos;
                  };
                  auto event_has_copilot = [&](JsonObject ev) -> bool {
                    if (is_copilot(ev["actor"]["login"] | (const char*)nullptr)) return true;
                    std::string t = ev["type"] | "";
                    if (t == "PullRequestEvent" || t == "PullRequestReviewEvent") {
                      if (is_copilot(ev["payload"]["pull_request"]["user"]["login"] | (const char*)nullptr)) return true;
                      JsonArray rr = ev["payload"]["pull_request"]["requested_reviewers"].as<JsonArray>();
                      if (!rr.isNull()) {
                        for (JsonObject r : rr) {
                          if (is_copilot(r["login"] | (const char*)nullptr)) return true;
                        }
                      }
                      if (is_copilot(ev["payload"]["review"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "IssueCommentEvent" || t == "PullRequestReviewCommentEvent") {
                      if (is_copilot(ev["payload"]["comment"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "IssuesEvent") {
                      if (is_copilot(ev["payload"]["issue"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "WorkflowRunEvent") {
                      if (is_copilot(ev["payload"]["workflow_run"]["actor"]["login"] | (const char*)nullptr)) return true;
                      if (is_copilot(ev["payload"]["workflow_run"]["triggering_actor"]["login"] | (const char*)nullptr)) return true;
                    }
                    return false;
                  };

                  // Collect events newer than last_top_event_id (top-down, stop on match).
                  // On first fetch, load only the top event so the user sees proof of life.
                  std::string old_last = id(last_top_event_id);
                  bool first_fetch = old_last.empty();
                  std::string new_top;
                  std::vector<std::string> new_lines;
                  std::vector<std::string> new_detail;
                  std::vector<uint8_t> new_copilot;
                  std::vector<uint8_t> new_ci_fail;
                  int limit = first_fetch ? 1 : count;
                  for (int i = 0; i < limit; i++) {
                    JsonObject ev = arr[i].as<JsonObject>();
                    std::string evid = ev["id"] | "";
                    if (i == 0) new_top = evid;
                    if (!first_fetch && !evid.empty() && evid == old_last) break;
                    new_lines.push_back(make_line(ev));
                    new_detail.push_back(make_detail(ev));
                    new_copilot.push_back(event_has_copilot(ev) ? 1 : 0);
                    std::string t = ev["type"] | "";
                    std::string c = ev["payload"]["workflow_run"]["conclusion"] | "";
                    new_ci_fail.push_back((t == "WorkflowRunEvent" && c == "failure") ? 1 : 0);
                  }
                  if (!new_top.empty()) id(last_top_event_id) = new_top;

                  // Reverse so the oldest new event shows first
                  std::reverse(new_lines.begin(), new_lines.end());
                  std::reverse(new_detail.begin(), new_detail.end());
                  std::reverse(new_copilot.begin(), new_copilot.end());
                  std::reverse(new_ci_fail.begin(), new_ci_fail.end());

                  if (!new_lines.empty()) {
                    id(carousel_lines) = new_lines;
                    id(carousel_detail) = new_detail;
                    id(carousel_copilot) = new_copilot;
                    id(carousel_ci_fail) = new_ci_fail;
                    id(carousel_idx) = 0;
                    id(carousel_frames) = 20;  // 5s on first slide
                    // Events mode timer: at least 3 min, or enough to show all slides once
                    int n = (int) new_lines.size();
                    int needed = n * 20 + 40;
                    const int three_min = 720;
                    id(idle_frames) = needed > three_min ? needed : three_min;
                    bool any_fail = false;
                    for (auto f : new_ci_fail) if (f) { any_fail = true; break; }
                    id(pending_beep) = true;
                    id(pending_beep_fail) = any_fail;
                    ESP_LOGD("github", "carousel loaded: %d new event(s)", n);
                  }
              # Wake the screen if we were asleep, so the event is seen.
              - script.execute: apply_screen_power
              - if:
                  condition:
                    lambda: 'return id(pending_beep) && id(pending_beep_fail);'
                  then:
                    - lambda: 'id(pending_beep) = false;'
                    - rtttl.play: "fail:d=8,o=5,b=220:e,c,a4,p"
              - if:
                  condition:
                    lambda: 'return id(pending_beep) && !id(pending_beep_fail);'
                  then:
                    - lambda: 'id(pending_beep) = false;'
                    - rtttl.play: "ping:d=16,o=6,b=300:e,g"

  # Copilot usage for the authenticated user. Pulls the current billing
  # cycle's usage items and sums anything where product == "Copilot".
  # Requires a fine-grained PAT with "Plan: read-only" (billing) access.
  - id: fetch_copilot_usage
    mode: restart
    then:
      - http_request.get:
          url: "https://api.github.com/users/${github_user}/settings/billing/usage"
          max_response_buffer_size: 16384
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(copilot_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(copilot_retry_pending) = true;'
                  - logger.log:
                      format: "copilot usage fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_copilot_usage
                else:
                  - logger.log:
                      format: "copilot usage fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(copilot_retry_pending) = false;'
              - lambda: |-
                  int sc = response->status_code;
                  if (sc != 200) {
                    ESP_LOGW("github", "copilot usage HTTP %d", sc);
                    if (sc == 401 || sc == 403 || sc == 404) {
                      id(copilot_disabled) = true;
                      ESP_LOGW("github", "copilot usage disabled until reboot (token missing Plan:RO?)");
                    }
                    return;
                  }
                  // Filter - keep only the fields we sum over.
                  JsonDocument filter;
                  filter["usageItems"][0]["product"] = true;
                  filter["usageItems"][0]["sku"] = true;
                  filter["usageItems"][0]["quantity"] = true;
                  filter["usageItems"][0]["netAmount"] = true;
                  filter["usageItems"][0]["unitType"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "copilot usage parse failed: %s", err.c_str());
                    return;
                  }
                  JsonArray items = doc["usageItems"].as<JsonArray>();
                  if (items.isNull()) {
                    // Some accounts return an empty response; treat as zero usage.
                    id(copilot_qty) = 0.0f;
                    id(copilot_net) = 0.0f;
                    id(copilot_sku) = "";
                    id(copilot_ok) = true;
                    ESP_LOGD("github", "copilot usage: no items");
                    return;
                  }

                  float qty = 0.0f;
                  float net = 0.0f;
                  std::string primary_sku;
                  int primary_count = 0;
                  for (JsonObject it : items) {
                    std::string product = it["product"] | "";
                    // Case-insensitive match on "copilot"
                    std::string p = product;
                    for (auto &c : p) c = std::tolower(c);
                    if (p.find("copilot") == std::string::npos) continue;
                    float q = it["quantity"] | 0.0f;
                    float n = it["netAmount"] | 0.0f;
                    qty += q;
                    net += n;
                    std::string sku = it["sku"] | "";
                    if (!sku.empty() && (primary_sku.empty() || q > primary_count)) {
                      primary_sku = sku;
                      primary_count = (int) q;
                    }
                  }
                  // Shorten SKU for display (e.g. strip leading "Copilot ")
                  if (primary_sku.rfind("Copilot ", 0) == 0) {
                    primary_sku = primary_sku.substr(8);
                  }
                  if (primary_sku.size() > 22) primary_sku = primary_sku.substr(0, 22);

                  id(copilot_qty) = qty;
                  id(copilot_net) = net;
                  id(copilot_sku) = primary_sku;
                  id(copilot_ok) = true;
                  ESP_LOGD("github", "copilot usage: qty=%.2f net=%.2f sku=%s",
                           qty, net, primary_sku.c_str());

  # GraphQL: contributions (commits/PRs/reviews/issues) for today, this
  # week and this year, plus PR counts via aliased search. A single
  # request returns everything we need for the Contributions and PRs
  # cards. Private repos are counted only if the token has Contents:RO
  # on them AND "Include private contributions on my profile" is on.
  - id: fetch_stats_graphql
    mode: restart
    then:
      - http_request.post:
          url: "https://api.github.com/graphql"
          max_response_buffer_size: 8192
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            Content-Type: "application/json"
          # The GraphQL query uses variables $user, $dayStart, $weekStart,
          # $yearStart. Dates are injected at request time as UTC ISO8601
          # midnight. We let the device's current time drive the windows.
          body: !lambda |-
            auto pad2 = [](int v) {
              char b[4]; snprintf(b, sizeof(b), "%02d", v); return std::string(b);
            };
            auto now = id(sntp_time).now();
            std::string day_start, week_start, year_start;
            std::string merged_week, open_q, review_q;
            if (now.is_valid()) {
              char ybuf[8]; snprintf(ybuf, sizeof(ybuf), "%04d", now.year);
              day_start  = std::string(ybuf) + "-" + pad2(now.month) + "-" + pad2(now.day_of_month) + "T00:00:00Z";
              // Week starts Monday (UTC)
              int dow = now.day_of_week;  // 1=Sun..7=Sat (ESPHome convention)
              int back = (dow == 1) ? 6 : (dow - 2);
              // Subtract `back` days by working in epoch seconds
              time_t t = now.timestamp - (back * 86400) -
                         (now.hour * 3600 + now.minute * 60 + now.second);
              struct tm wt; gmtime_r(&t, &wt);
              char wb[24]; snprintf(wb, sizeof(wb), "%04d-%02d-%02dT00:00:00Z",
                                    wt.tm_year + 1900, wt.tm_mon + 1, wt.tm_mday);
              week_start = wb;
              year_start = std::string(ybuf) + "-01-01T00:00:00Z";
              // Also compute a YYYY-MM-DD for search (merged:>=)
              char mb[16]; snprintf(mb, sizeof(mb), "%04d-%02d-%02d",
                                    wt.tm_year + 1900, wt.tm_mon + 1, wt.tm_mday);
              merged_week = std::string("is:pr author:") + "${github_user}" +
                            " is:merged merged:>=" + mb;
            } else {
              // No clock yet - fall back to the start of the Unix year.
              // GraphQL will still accept the window; counts will just be
              // "since boot with no clock" which is fine as a once-off.
              day_start = "2026-01-01T00:00:00Z";
              week_start = "2026-01-01T00:00:00Z";
              year_start = "2026-01-01T00:00:00Z";
              merged_week = std::string("is:pr author:") + "${github_user}" + " is:merged";
            }
            open_q  = std::string("is:pr author:") + "${github_user}" + " is:open";
            review_q = std::string("is:pr review-requested:") + "${github_user}" + " is:open";

            std::string q =
              "query($user:String!, $dayStart:DateTime!, $weekStart:DateTime!, $yearStart:DateTime!, $mergedWeek:String!, $openQ:String!, $reviewQ:String!) {"
              "  today: user(login:$user){ contributionsCollection(from:$dayStart){ totalCommitContributions totalPullRequestContributions totalPullRequestReviewContributions totalIssueContributions } }"
              "  week:  user(login:$user){ contributionsCollection(from:$weekStart){ totalCommitContributions totalPullRequestContributions totalPullRequestReviewContributions totalIssueContributions } }"
              "  year:  user(login:$user){ contributionsCollection(from:$yearStart){ totalCommitContributions totalPullRequestContributions } }"
              "  merged:  search(query:$mergedWeek, type:ISSUE){ issueCount }"
              "  open:    search(query:$openQ,     type:ISSUE){ issueCount }"
              "  review:  search(query:$reviewQ,   type:ISSUE){ issueCount }"
              "}";

            // Manual JSON build (avoids a second parse). Values are user
            // names and ISO dates so no escaping needed.
            std::string body;
            body.reserve(1024);
            body += "{\"query\":\"";
            // Escape the quotes in q
            for (char c : q) { if (c == '"') body += "\\\""; else body += c; }
            body += "\",\"variables\":{";
            body += "\"user\":\"${github_user}\",";
            body += "\"dayStart\":\"" + day_start + "\",";
            body += "\"weekStart\":\"" + week_start + "\",";
            body += "\"yearStart\":\"" + year_start + "\",";
            body += "\"mergedWeek\":\"" + merged_week + "\",";
            body += "\"openQ\":\"" + open_q + "\",";
            body += "\"reviewQ\":\"" + review_q + "\"";
            body += "}}";
            return body;
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(stats_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(stats_retry_pending) = true;'
                  - logger.log:
                      format: "stats graphql fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_stats_graphql
                else:
                  - logger.log:
                      format: "stats graphql fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(stats_retry_pending) = false;'
              - lambda: |-
                  int sc = response->status_code;
                  if (sc != 200) {
                    ESP_LOGW("github", "stats graphql HTTP %d", sc);
                    if (sc == 401 || sc == 403 || sc == 404) {
                      id(stats_disabled) = true;
                      ESP_LOGW("github", "stats disabled until reboot (token rejected)");
                    }
                    return;
                  }
                  JsonDocument filter;
                  filter["data"]["today"]["contributionsCollection"]["totalCommitContributions"] = true;
                  filter["data"]["today"]["contributionsCollection"]["totalPullRequestContributions"] = true;
                  filter["data"]["today"]["contributionsCollection"]["totalPullRequestReviewContributions"] = true;
                  filter["data"]["today"]["contributionsCollection"]["totalIssueContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalCommitContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalPullRequestContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalPullRequestReviewContributions"] = true;
                  filter["data"]["week"]["contributionsCollection"]["totalIssueContributions"] = true;
                  filter["data"]["year"]["contributionsCollection"]["totalCommitContributions"] = true;
                  filter["data"]["year"]["contributionsCollection"]["totalPullRequestContributions"] = true;
                  filter["data"]["merged"]["issueCount"] = true;
                  filter["data"]["open"]["issueCount"] = true;
                  filter["data"]["review"]["issueCount"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "stats graphql parse failed: %s", err.c_str());
                    return;
                  }
                  auto t = doc["data"]["today"]["contributionsCollection"];
                  auto w = doc["data"]["week"]["contributionsCollection"];
                  auto y = doc["data"]["year"]["contributionsCollection"];

                  id(commits_today) = t["totalCommitContributions"] | 0;
                  id(commits_week)  = w["totalCommitContributions"] | 0;
                  id(commits_year) = y["totalCommitContributions"] | 0;
                  id(prs_today)    = t["totalPullRequestContributions"] | 0;
                  id(prs_week)     = w["totalPullRequestContributions"] | 0;
                  id(prs_year)     = y["totalPullRequestContributions"] | 0;
                  id(reviews_week) = w["totalPullRequestReviewContributions"] | 0;
                  id(issues_week)  = w["totalIssueContributions"] | 0;
                  id(prs_open)            = doc["data"]["open"]["issueCount"] | 0;
                  id(prs_merged_week)     = doc["data"]["merged"]["issueCount"] | 0;
                  id(prs_review_requested)= doc["data"]["review"]["issueCount"] | 0;
                  id(stats_ok) = true;
                  ESP_LOGD("github",
                           "stats: c(d/w/y)=%d/%d/%d prs(d/w/y)=%d/%d/%d open=%d merged=%d review=%d",
                           id(commits_today), id(commits_week), id(commits_year),
                           id(prs_today), id(prs_week), id(prs_year),
                           id(prs_open), id(prs_merged_week), id(prs_review_requested));

  # /rate_limit - free info: core API budget + any Copilot rate buckets
  # the account exposes. The copilot bucket only appears for accounts
  # where GitHub gates Copilot requests per-user.
  - id: fetch_rate_limit
    mode: restart
    then:
      - http_request.get:
          url: "https://api.github.com/rate_limit"
          max_response_buffer_size: 4096
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(ratelimit_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(ratelimit_retry_pending) = true;'
                  - logger.log:
                      format: "rate_limit fetch failed, retrying in 30s"
                      level: WARN
                      tag: "github"
                  - delay: 30s
                  - script.execute: fetch_rate_limit
                else:
                  - logger.log:
                      format: "rate_limit fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: WARN
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(ratelimit_retry_pending) = false;'
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("github", "rate_limit HTTP %d", response->status_code);
                    return;
                  }
                  JsonDocument filter;
                  filter["resources"]["core"]["used"] = true;
                  filter["resources"]["core"]["limit"] = true;
                  filter["resources"]["core"]["reset"] = true;
                  filter["resources"]["copilot"]["used"] = true;
                  filter["resources"]["copilot"]["limit"] = true;
                  filter["resources"]["copilot"]["reset"] = true;
                  filter["resources"]["copilot_chat"]["used"] = true;
                  filter["resources"]["copilot_chat"]["limit"] = true;
                  filter["resources"]["copilot_chat"]["reset"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "rate_limit parse failed: %s", err.c_str());
                    return;
                  }
                  JsonObject res = doc["resources"].as<JsonObject>();
                  if (res.isNull()) return;

                  id(rl_core_used)  = res["core"]["used"]  | 0;
                  id(rl_core_limit) = res["core"]["limit"] | 0;
                  id(rl_core_reset) = res["core"]["reset"] | 0;

                  // Prefer the `copilot` bucket; fall back to `copilot_chat`.
                  if (!res["copilot"].isNull()) {
                    id(rl_copilot_used)  = res["copilot"]["used"]  | 0;
                    id(rl_copilot_limit) = res["copilot"]["limit"] | 0;
                    id(rl_copilot_reset) = res["copilot"]["reset"] | 0;
                  } else if (!res["copilot_chat"].isNull()) {
                    id(rl_copilot_used)  = res["copilot_chat"]["used"]  | 0;
                    id(rl_copilot_limit) = res["copilot_chat"]["limit"] | 0;
                    id(rl_copilot_reset) = res["copilot_chat"]["reset"] | 0;
                  } else {
                    id(rl_copilot_used) = -1;   // not exposed on this account
                  }
                  id(ratelimit_ok) = true;
                  ESP_LOGD("github", "rate_limit: core=%d/%d copilot=%d/%d",
                           id(rl_core_used), id(rl_core_limit),
                           id(rl_copilot_used), id(rl_copilot_limit));

spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

display:
  - platform: st7789v
    model: CUSTOM
    id: main_display
    cs_pin: GPIO5
    dc_pin: GPIO23
    reset_pin: GPIO18
    rotation: ${rotate_display}
    height: 240
    width: 135
    offset_height: 40
    offset_width: 52
    update_interval: 250ms
    lambda: |-
      const int W = it.get_width();
      const int H = it.get_height();

      it.fill(Color(0, 0, 0));

      // Night mode: render a blank screen (backlight is off anyway,
      // but this saves redraw cost and avoids a flash on wake).
      if (id(screen_asleep) && id(wake_frames) == 0 && id(idle_frames) == 0) return;

      // header bar
      it.filled_rectangle(0, 0, W, 22, Color(20, 20, 40));
      it.print(4, 3, id(font_med), Color(180, 200, 255), "GitHub");

      // battery % (header, between label and CI tally)
      {
        int bl = 0;
        if (!std::isnan(id(battery_level).state)) bl = (int) id(battery_level).state;
        if (bl < 0) bl = 0; if (bl > 100) bl = 100;
        char batt[8];
        sprintf(batt, "%d%%", bl);
        Color bc = bl < 20 ? Color(255, 80, 80) :
                   bl < 50 ? Color(255, 220, 80) :
                             Color(120, 255, 120);
        it.print(72, 3, id(font_med), bc, batt);
      }

      // CI tally: right-aligned in the header
      {
        const int slot_w = 32;
        int base_x = W - slot_w * 3 - 4;
        char nbuf[8];
        it.print(base_x, 5, id(mdi_status), Color(255, 220, 120), "\U000F0453");
        sprintf(nbuf, "%d", id(ci_running));
        it.print(base_x + 14, 3, id(font_small), Color(255, 220, 120), nbuf);
        it.print(base_x + slot_w, 5, id(mdi_status), Color(140, 255, 160), "\U000F012C");
        sprintf(nbuf, "%d", id(ci_success));
        it.print(base_x + slot_w + 14, 3, id(font_small), Color(140, 255, 160), nbuf);
        it.print(base_x + slot_w * 2, 5, id(mdi_status), Color(255, 120, 120), "\U000F0156");
        sprintf(nbuf, "%d", id(ci_failed));
        it.print(base_x + slot_w * 2 + 14, 3, id(font_small), Color(255, 120, 120), nbuf);
      }

      bool events_mode = id(idle_frames) > 0 && !id(carousel_lines).empty();

      if (events_mode) {
        int idx = id(carousel_idx);
        int n = (int) id(carousel_lines).size();
        if (idx < 0) idx = 0;
        if (idx >= n) idx = n - 1;

        const std::string &text = id(carousel_lines)[idx];
        const std::string &detail = (idx < (int) id(carousel_detail).size())
                                      ? id(carousel_detail)[idx]
                                      : std::string();
        bool cp = id(carousel_copilot)[idx] != 0;
        bool fail = id(carousel_ci_fail)[idx] != 0;
        Color fg = fail ? Color(255, 120, 120) :
                   cp   ? Color(200, 170, 255) :
                          Color(120, 220, 255);
        int cx = W / 2;
        int headline_y = 50;
        int detail_y = 86;
        if (cp) {
          it.print(6, headline_y - 12, id(mdi_copilot), Color(180, 140, 255), "\U000F06A9");
        }
        it.print(cx, headline_y, id(font_big), fg, TextAlign::CENTER, text.c_str());
        if (!detail.empty()) {
          it.print(cx, detail_y, id(font_med), Color(200, 200, 220),
                   TextAlign::CENTER, detail.c_str());
        }
        it.print(4, H - 10, id(font_small), Color(120, 120, 150),
                 TextAlign::BASELINE_LEFT, "A: dismiss");

        // carousel dots
        int dots_y = H - 4;
        int spacing = 8;
        int first_x = cx - (n - 1) * spacing / 2;
        for (int i = 0; i < n; i++) {
          Color dc = (i == idx) ? Color(220, 230, 255) : Color(60, 80, 100);
          it.filled_circle(first_x + i * spacing, dots_y, 2, dc);
        }
      } else if (id(screensaver_frames) > 0 && id(idle_screen) == 1 && id(copilot_ok)) {
        // --- Copilot usage card ---
        int cx = W / 2;
        // Big Copilot icon, left of the number
        it.print(14, 30, id(mdi_copilot_big), Color(180, 140, 255), "\U000F06A9");
        // Title
        it.print(cx + 12, 34, id(font_med), Color(200, 170, 255),
                 TextAlign::TOP_CENTER, "Copilot");
        // Big quantity
        {
          char qbuf[24];
          float q = id(copilot_qty);
          if (q >= 1000.0f) sprintf(qbuf, "%.1fk", q / 1000.0f);
          else if (q == (int) q) sprintf(qbuf, "%d", (int) q);
          else sprintf(qbuf, "%.1f", q);
          it.print(cx + 12, 58, id(font_big), Color(220, 200, 255),
                   TextAlign::TOP_CENTER, qbuf);
        }
        // SKU / unit subtitle
        {
          const std::string &sku = id(copilot_sku);
          const char *sub = sku.empty() ? "requests this cycle" : sku.c_str();
          it.print(cx, 92, id(font_small), Color(180, 180, 210),
                   TextAlign::TOP_CENTER, sub);
        }
        // Net $ amount, bottom-right
        if (id(copilot_net) > 0.0f) {
          char nbuf[16];
          sprintf(nbuf, "$%.2f", id(copilot_net));
          it.print(W - 4, H - 4, id(font_small), Color(140, 255, 160),
                   TextAlign::BASELINE_RIGHT, nbuf);
        }
      } else if (id(screensaver_frames) > 0 && id(idle_screen) == 2 && id(stats_ok)) {
        // --- Contributions card (commits / PRs over today / week / year) ---
        int cx = W / 2;
        it.print(cx, 28, id(font_med), Color(180, 220, 255),
                 TextAlign::TOP_CENTER, "Contributions");
        // 3-column mini-table: TODAY / WEEK / YEAR, rows: commits, PRs
        const int col_w = (W - 8) / 3;
        const int base_x = 4;
        const char *heads[3] = { "TODAY", "WEEK", "YEAR" };
        int commits[3] = { id(commits_today), id(commits_week), id(commits_year) };
        int prs[3]     = { id(prs_today),     id(prs_week),     id(prs_year) };
        for (int i = 0; i < 3; i++) {
          int cx_col = base_x + col_w * i + col_w / 2;
          it.print(cx_col, 50, id(font_small), Color(160, 160, 190),
                   TextAlign::TOP_CENTER, heads[i]);
          char b[12];
          sprintf(b, "%d", commits[i]);
          it.print(cx_col, 66, id(font_med), Color(140, 255, 160),
                   TextAlign::TOP_CENTER, b);
          sprintf(b, "%d", prs[i]);
          it.print(cx_col, 90, id(font_med), Color(200, 170, 255),
                   TextAlign::TOP_CENTER, b);
        }
        it.print(4,  H - 4, id(font_small), Color(140, 255, 160),
                 TextAlign::BASELINE_LEFT, "commits");
        it.print(W - 4, H - 4, id(font_small), Color(200, 170, 255),
                 TextAlign::BASELINE_RIGHT, "PRs");
      } else if (id(screensaver_frames) > 0 && id(idle_screen) == 3 && id(stats_ok)) {
        // --- PR status card ---
        int cx = W / 2;
        it.print(cx, 28, id(font_med), Color(200, 170, 255),
                 TextAlign::TOP_CENTER, "Pull Requests");
        // Big number: open PRs authored by you
        {
          char buf[12];
          sprintf(buf, "%d", id(prs_open));
          it.print(cx, 50, id(font_big), Color(220, 220, 255),
                   TextAlign::TOP_CENTER, buf);
          it.print(cx, 82, id(font_small), Color(180, 180, 210),
                   TextAlign::TOP_CENTER, "open");
        }
        // Bottom row: merged this week | review requested on you
        {
          char buf[40];
          sprintf(buf, "%d merged wk", id(prs_merged_week));
          it.print(4, H - 4, id(font_small), Color(140, 255, 160),
                   TextAlign::BASELINE_LEFT, buf);
          sprintf(buf, "%d to review", id(prs_review_requested));
          it.print(W - 4, H - 4, id(font_small), Color(255, 220, 120),
                   TextAlign::BASELINE_RIGHT, buf);
        }
      } else if (id(screensaver_frames) > 0 && id(idle_screen) == 4) {
        // --- CI summary card (from the most recent events page) ---
        int cx = W / 2;
        it.print(cx, 28, id(font_med), Color(180, 220, 255),
                 TextAlign::TOP_CENTER, "CI (recent)");
        const int col_w = (W - 8) / 3;
        const int base_x = 4;
        const char *heads[3] = { "RUN", "OK", "FAIL" };
        int vals[3]          = { id(ci_running), id(ci_success), id(ci_failed) };
        Color colors[3]      = { Color(255, 220, 120), Color(140, 255, 160), Color(255, 120, 120) };
        for (int i = 0; i < 3; i++) {
          int cx_col = base_x + col_w * i + col_w / 2;
          it.print(cx_col, 50, id(font_small), colors[i],
                   TextAlign::TOP_CENTER, heads[i]);
          char b[12];
          sprintf(b, "%d", vals[i]);
          it.print(cx_col, 66, id(font_big), colors[i],
                   TextAlign::TOP_CENTER, b);
        }
        it.print(cx, H - 4, id(font_small), Color(140, 140, 170),
                 TextAlign::BASELINE_CENTER, "last ~30 events");
      } else if (id(screensaver_frames) > 0 && id(idle_screen) == 5 && id(ratelimit_ok)) {
        // --- API rate-limit card ---
        int cx = W / 2;
        it.print(cx, 28, id(font_med), Color(180, 220, 255),
                 TextAlign::TOP_CENTER, "API Rate Limit");
        {
          char buf[32];
          sprintf(buf, "%d / %d", id(rl_core_used), id(rl_core_limit));
          it.print(cx, 48, id(font_big), Color(220, 220, 255),
                   TextAlign::TOP_CENTER, buf);
          it.print(cx, 80, id(font_small), Color(180, 180, 210),
                   TextAlign::TOP_CENTER, "core used / hour");
        }
        // Copilot bucket if exposed
        if (id(rl_copilot_used) >= 0) {
          char buf[40];
          sprintf(buf, "copilot %d/%d", id(rl_copilot_used), id(rl_copilot_limit));
          it.print(cx, H - 4, id(font_small), Color(200, 170, 255),
                   TextAlign::BASELINE_CENTER, buf);
        } else {
          // Show reset time instead
          uint32_t reset = id(rl_core_reset);
          auto now = id(sntp_time).now();
          if (reset > 0 && now.is_valid() && reset > (uint32_t) now.timestamp) {
            uint32_t dt = reset - now.timestamp;
            char buf[32];
            if (dt < 3600) snprintf(buf, sizeof(buf), "resets in %um", dt / 60);
            else           snprintf(buf, sizeof(buf), "resets in %uh", dt / 3600);
            it.print(cx, H - 4, id(font_small), Color(140, 140, 170),
                     TextAlign::BASELINE_CENTER, buf);
          }
        }
      } else {
        // DVD-bouncer github logo
        static const Color palette[5] = {
          Color(120, 220, 255),
          Color(180, 140, 255),
          Color(255, 220, 120),
          Color(140, 255, 160),
          Color(255, 160, 200),
        };
        Color c = palette[id(gh_color_idx) % 5];
        it.print(id(gh_x), id(gh_y), id(mdi_big), c, "\U000F02A4");
      }

sensor:
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      // AXP192 battery voltage: reg 0x78 (hi 8 bits) + 0x79 (lo 4 bits), 1.1 mV/LSB
      uint8_t reg = 0x78;
      if (id(bus_a)->write(0x34, &reg, 1, false) != i2c::ERROR_OK) return NAN;
      uint8_t buf[2];
      if (id(bus_a)->read(0x34, buf, 2) != i2c::ERROR_OK) return NAN;
      uint16_t raw = ((uint16_t) buf[0] << 4) | (buf[1] & 0x0F);
      float v = raw * 1.1f / 1000.0f;
      float pct = (v - 3.3f) / 0.9f * 100.0f;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      return pct;
