substitutions:
  rotate_display: "90"   # 90 or 270 for landscape; swap if upside-down
  github_user: !secret ghgizmo_github_user
  github_token: !secret ghgizmo_github_token

esphome:
  name: ghmonitorgizmo
  friendly_name: GH Monitor Gizmo

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN: "4096"
      CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN: "16384"
      CONFIG_MBEDTLS_DYNAMIC_BUFFER: y
      CONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA: y
      CONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT: y

logger:

api:
  encryption:
    key: !secret ghgizmo_api_encryption_key

ota:
  - platform: esphome
    password: !secret ghgizmo_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 192.168.4.10
    gateway: 192.168.4.1
    subnet: 255.255.255.0
    dns1: 1.1.1.1
    dns2: 8.8.8.8

  ap:
    ssid: "GH Monitor Gizmo"
    password: !secret ghgizmo_ap_password

http_request:
  useragent: "esphome-m5stick"
  timeout: 15s
  verify_ssl: false
  follow_redirects: true
  buffer_size_rx: 12288
  buffer_size_tx: 1024

i2c:
  id: bus_a
  sda: GPIO21
  scl: GPIO22
  scan: true

# --- Buzzer on GPIO2 (M5StickC Plus) ---
output:
  - platform: ledc
    pin: GPIO2
    id: buzzer_out

rtttl:
  id: buzzer
  output: buzzer_out

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO37
      inverted: true
      mode:
        input: true
    name: "Button A"
    id: btn_a
    on_press:
      then:
        - lambda: |-
            // Dismiss: drop straight back to idle
            id(idle_frames) = 0;
            id(carousel_lines).clear();
            id(carousel_copilot).clear();
            id(carousel_ci_fail).clear();
            id(carousel_detail).clear();
            id(carousel_idx) = 0;
            id(carousel_frames) = 0;

# --- FONTS ---
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto@700"
    id: font_med
    size: 18
  - file: "gfonts://Roboto@900"
    id: font_big
    size: 26
  # Material Design Icons - for the idle cycle and per-line icons
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_big
    size: 64
    glyphs:
      - "\U000F02A4"   # mdi:github
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_copilot
    size: 18
    glyphs:
      - "\U000F06A9"   # mdi:robot  (Copilot marker)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_status
    size: 14
    glyphs:
      - "\U000F0453"   # mdi:sync (running)
      - "\U000F012C"   # mdi:check (success)
      - "\U000F0156"   # mdi:close (failed)

globals:
  - id: last_top_event_id
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: user_retry_pending
    type: bool
    restore_value: no
    initial_value: 'false'

  # CI tallies from the most recent page of events
  - id: ci_running
    type: int
    initial_value: '0'
  - id: ci_success
    type: int
    initial_value: '0'
  - id: ci_failed
    type: int
    initial_value: '0'

  # Carousel queue of new events since last fetch (oldest first)
  - id: carousel_lines
    type: std::vector<std::string>
    restore_value: no
  - id: carousel_detail
    type: std::vector<std::string>
    restore_value: no
  - id: carousel_copilot
    type: std::vector<uint8_t>
    restore_value: no
  - id: carousel_ci_fail
    type: std::vector<uint8_t>
    restore_value: no
  - id: carousel_idx
    type: int
    initial_value: '0'
  - id: carousel_frames
    type: int
    initial_value: '0'
  # Ticks remaining in "events mode"; 0 = show DVD bouncer idle screen
  - id: idle_frames
    type: int
    initial_value: '0'

  # Beep handoff from fetch lambda to the outer rtttl action
  - id: pending_beep
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pending_beep_fail
    type: bool
    restore_value: no
    initial_value: 'false'

  # DVD-bouncer github logo state
  - id: gh_x
    type: int
    initial_value: '20'
  - id: gh_y
    type: int
    initial_value: '40'
  - id: gh_vx
    type: int
    initial_value: '3'
  - id: gh_vy
    type: int
    initial_value: '2'
  - id: gh_color_idx
    type: int
    initial_value: '0'

interval:
  - interval: 250ms
    then:
      - lambda: |-
          // Count down events-mode timer; when it hits 0 drop back to idle
          if (id(idle_frames) > 0) {
            id(idle_frames) = id(idle_frames) - 1;
            if (id(idle_frames) == 0) {
              id(carousel_lines).clear();
              id(carousel_copilot).clear();
              id(carousel_ci_fail).clear();
              id(carousel_detail).clear();
              id(carousel_idx) = 0;
              id(carousel_frames) = 0;
            }
          }

          // Advance carousel slide
          if (!id(carousel_lines).empty()) {
            if (id(carousel_frames) > 0) {
              id(carousel_frames) = id(carousel_frames) - 1;
            }
            if (id(carousel_frames) == 0) {
              int n = (int) id(carousel_lines).size();
              id(carousel_idx) = (id(carousel_idx) + 1) % n;
              id(carousel_frames) = 20;  // ~5s per slide at 250ms tick
            }
          }

          // DVD-bouncer: advance only while idle
          if (id(idle_frames) == 0) {
            const int W = 240, H = 135;
            const int GW = 52, GH = 64;
            const int TOP = 22;
            int x = id(gh_x) + id(gh_vx);
            int y = id(gh_y) + id(gh_vy);
            bool bounced = false;
            if (x <= 0)         { x = 0;         id(gh_vx) = -id(gh_vx); bounced = true; }
            else if (x >= W - GW) { x = W - GW; id(gh_vx) = -id(gh_vx); bounced = true; }
            if (y <= TOP)       { y = TOP;       id(gh_vy) = -id(gh_vy); bounced = true; }
            else if (y >= H - GH) { y = H - GH; id(gh_vy) = -id(gh_vy); bounced = true; }
            id(gh_x) = x;
            id(gh_y) = y;
            if (bounced) id(gh_color_idx) = (id(gh_color_idx) + 1) % 5;
          }

  - interval: 90s
    startup_delay: 30s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: 'id(user_retry_pending) = false;'
            - script.execute: fetch_user_events

script:
  - id: fetch_user_events
    mode: restart
    then:
      - http_request.get:
          url: "https://api.github.com/users/${github_user}/events?per_page=6"
          max_response_buffer_size: 12288
          request_headers:
            Authorization: "Bearer ${github_token}"
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          capture_response: true
          on_error:
            - if:
                condition:
                  and:
                    - lambda: 'return !id(user_retry_pending);'
                    - wifi.connected:
                then:
                  - lambda: 'id(user_retry_pending) = true;'
                  - logger.log:
                      format: "user events fetch failed, retrying in 10s"
                      level: DEBUG
                      tag: "github"
                  - delay: 10s
                  - script.execute: fetch_user_events
                else:
                  - logger.log:
                      format: "user events fetch failed (offline or retry exhausted), waiting for next cycle"
                      level: DEBUG
                      tag: "github"
          on_response:
            then:
              - lambda: 'id(user_retry_pending) = false;'
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("github", "user events HTTP %d", response->status_code);
                    return;
                  }
                  // Filter - keep only fields we use, so 30 events fit easily
                  JsonDocument filter;
                  filter[0]["id"] = true;
                  filter[0]["type"] = true;
                  filter[0]["repo"]["name"] = true;
                  filter[0]["actor"]["login"] = true;
                  filter[0]["payload"]["workflow_run"]["status"] = true;
                  filter[0]["payload"]["workflow_run"]["conclusion"] = true;
                  filter[0]["payload"]["workflow_run"]["actor"]["login"] = true;
                  filter[0]["payload"]["workflow_run"]["triggering_actor"]["login"] = true;
                  filter[0]["payload"]["check_run"]["status"] = true;
                  filter[0]["payload"]["check_run"]["conclusion"] = true;
                  filter[0]["payload"]["pull_request"]["user"]["login"] = true;
                  filter[0]["payload"]["pull_request"]["requested_reviewers"][0]["login"] = true;
                  filter[0]["payload"]["review"]["user"]["login"] = true;
                  filter[0]["payload"]["comment"]["user"]["login"] = true;
                  filter[0]["payload"]["issue"]["user"]["login"] = true;
                  filter[0]["payload"]["ref"] = true;
                  filter[0]["payload"]["ref_type"] = true;
                  filter[0]["payload"]["action"] = true;
                  filter[0]["payload"]["issue"]["number"] = true;
                  filter[0]["payload"]["pull_request"]["number"] = true;

                  JsonDocument doc;
                  DeserializationError err = deserializeJson(doc, body,
                      DeserializationOption::Filter(filter));
                  if (err) {
                    ESP_LOGW("github", "user json parse failed: %s", err.c_str());
                    return;
                  }
                  JsonArray arr = doc.as<JsonArray>();
                  if (arr.isNull()) return;

                  auto make_line = [](JsonObject obj) -> std::string {
                    std::string type = obj["type"] | "";
                    std::string label;
                    if (type == "WorkflowRunEvent") {
                      std::string status = obj["payload"]["workflow_run"]["status"] | "";
                      std::string concl  = obj["payload"]["workflow_run"]["conclusion"] | "";
                      if (status == "completed") {
                        if (concl == "success")        label = "CI OK";
                        else if (concl == "failure")   label = "CI FAIL";
                        else if (concl == "cancelled") label = "CI X";
                        else if (concl == "skipped")   label = "CI -";
                        else                           label = "CI ?";
                      } else if (status == "in_progress") {
                        label = "CI RUN";
                      } else {
                        label = "CI Q";
                      }
                    } else if (type == "CheckRunEvent") {
                      std::string status = obj["payload"]["check_run"]["status"] | "";
                      std::string concl  = obj["payload"]["check_run"]["conclusion"] | "";
                      if (status == "completed")
                        label = (concl == "success") ? "Check OK" :
                                (concl == "failure") ? "Check FAIL" : "Check ?";
                      else
                        label = "Check RUN";
                    } else if (type == "PushEvent")            label = "Push";
                    else if (type == "PullRequestEvent")       label = "PR";
                    else if (type == "PullRequestReviewEvent") label = "Review";
                    else if (type == "IssuesEvent")            label = "Issue";
                    else if (type == "IssueCommentEvent")      label = "Comment";
                    else if (type == "WatchEvent")             label = "Star";
                    else if (type == "CreateEvent") {
                      std::string rt = obj["payload"]["ref_type"] | "";
                      label = rt.empty() ? "Create" : ("New " + rt);
                    } else if (type == "DeleteEvent") {
                      std::string rt = obj["payload"]["ref_type"] | "";
                      label = rt.empty() ? "Delete" : ("Deleted " + rt);
                    }
                    else if (type == "ForkEvent")              label = "Fork";
                    else if (type == "ReleaseEvent")           label = "Release";
                    else if (type.size() > 10)                 label = type.substr(0, 10);
                    else                                       label = type;
                    return label;
                  };

                  // Second line: repo, and where useful the branch/ref/number
                  auto make_detail = [](JsonObject obj) -> std::string {
                    std::string type = obj["type"] | "";
                    std::string repo = obj["repo"]["name"] | "";
                    auto slash = repo.find('/');
                    std::string short_repo = (slash == std::string::npos) ? repo : repo.substr(slash + 1);
                    if (short_repo.size() > 22) short_repo = short_repo.substr(0, 22);

                    std::string extra;
                    if (type == "PushEvent" || type == "CreateEvent" || type == "DeleteEvent") {
                      std::string ref = obj["payload"]["ref"] | "";
                      // strip refs/heads/ or refs/tags/
                      if (ref.rfind("refs/heads/", 0) == 0) ref = ref.substr(11);
                      else if (ref.rfind("refs/tags/", 0) == 0) ref = ref.substr(10);
                      if (!ref.empty()) {
                        if (ref.size() > 18) ref = ref.substr(0, 18);
                        extra = ref;
                      }
                    } else if (type == "PullRequestEvent" || type == "PullRequestReviewEvent") {
                      int n = obj["payload"]["pull_request"]["number"] | 0;
                      if (n > 0) { char b[12]; sprintf(b, "#%d", n); extra = b; }
                    } else if (type == "IssuesEvent" || type == "IssueCommentEvent") {
                      int n = obj["payload"]["issue"]["number"] | 0;
                      if (n > 0) { char b[12]; sprintf(b, "#%d", n); extra = b; }
                    }
                    if (!extra.empty()) return extra + "  " + short_repo;
                    return short_repo;
                  };

                  // tally CI outcomes across the whole page
                  int running = 0, succ = 0, fail = 0;
                  for (JsonObject ev : arr) {
                    std::string type = ev["type"] | "";
                    if (type == "WorkflowRunEvent") {
                      std::string status = ev["payload"]["workflow_run"]["status"] | "";
                      std::string concl  = ev["payload"]["workflow_run"]["conclusion"] | "";
                      if (status == "completed") {
                        if (concl == "success") succ++;
                        else if (concl == "failure") fail++;
                      } else {
                        running++;
                      }
                    }
                  }
                  id(ci_running) = running;
                  id(ci_success) = succ;
                  id(ci_failed)  = fail;

                  int count = arr.size();

                  auto is_copilot = [](const char *s) -> bool {
                    if (!s) return false;
                    std::string v(s);
                    for (auto &c : v) c = std::tolower(c);
                    return v.find("copilot") != std::string::npos;
                  };
                  auto event_has_copilot = [&](JsonObject ev) -> bool {
                    if (is_copilot(ev["actor"]["login"] | (const char*)nullptr)) return true;
                    std::string t = ev["type"] | "";
                    if (t == "PullRequestEvent" || t == "PullRequestReviewEvent") {
                      if (is_copilot(ev["payload"]["pull_request"]["user"]["login"] | (const char*)nullptr)) return true;
                      JsonArray rr = ev["payload"]["pull_request"]["requested_reviewers"].as<JsonArray>();
                      if (!rr.isNull()) {
                        for (JsonObject r : rr) {
                          if (is_copilot(r["login"] | (const char*)nullptr)) return true;
                        }
                      }
                      if (is_copilot(ev["payload"]["review"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "IssueCommentEvent" || t == "PullRequestReviewCommentEvent") {
                      if (is_copilot(ev["payload"]["comment"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "IssuesEvent") {
                      if (is_copilot(ev["payload"]["issue"]["user"]["login"] | (const char*)nullptr)) return true;
                    }
                    if (t == "WorkflowRunEvent") {
                      if (is_copilot(ev["payload"]["workflow_run"]["actor"]["login"] | (const char*)nullptr)) return true;
                      if (is_copilot(ev["payload"]["workflow_run"]["triggering_actor"]["login"] | (const char*)nullptr)) return true;
                    }
                    return false;
                  };

                  // Collect events newer than last_top_event_id (top-down, stop on match).
                  // On first fetch, load only the top event so the user sees proof of life.
                  std::string old_last = id(last_top_event_id);
                  bool first_fetch = old_last.empty();
                  std::string new_top;
                  std::vector<std::string> new_lines;
                  std::vector<std::string> new_detail;
                  std::vector<uint8_t> new_copilot;
                  std::vector<uint8_t> new_ci_fail;
                  int limit = first_fetch ? 1 : count;
                  for (int i = 0; i < limit; i++) {
                    JsonObject ev = arr[i].as<JsonObject>();
                    std::string evid = ev["id"] | "";
                    if (i == 0) new_top = evid;
                    if (!first_fetch && !evid.empty() && evid == old_last) break;
                    new_lines.push_back(make_line(ev));
                    new_detail.push_back(make_detail(ev));
                    new_copilot.push_back(event_has_copilot(ev) ? 1 : 0);
                    std::string t = ev["type"] | "";
                    std::string c = ev["payload"]["workflow_run"]["conclusion"] | "";
                    new_ci_fail.push_back((t == "WorkflowRunEvent" && c == "failure") ? 1 : 0);
                  }
                  if (!new_top.empty()) id(last_top_event_id) = new_top;

                  // Reverse so the oldest new event shows first
                  std::reverse(new_lines.begin(), new_lines.end());
                  std::reverse(new_detail.begin(), new_detail.end());
                  std::reverse(new_copilot.begin(), new_copilot.end());
                  std::reverse(new_ci_fail.begin(), new_ci_fail.end());

                  if (!new_lines.empty()) {
                    id(carousel_lines) = new_lines;
                    id(carousel_detail) = new_detail;
                    id(carousel_copilot) = new_copilot;
                    id(carousel_ci_fail) = new_ci_fail;
                    id(carousel_idx) = 0;
                    id(carousel_frames) = 20;  // 5s on first slide
                    // Events mode timer: at least 3 min, or enough to show all slides once
                    int n = (int) new_lines.size();
                    int needed = n * 20 + 40;
                    const int three_min = 720;
                    id(idle_frames) = needed > three_min ? needed : three_min;
                    bool any_fail = false;
                    for (auto f : new_ci_fail) if (f) { any_fail = true; break; }
                    id(pending_beep) = true;
                    id(pending_beep_fail) = any_fail;
                    ESP_LOGD("github", "carousel loaded: %d new event(s)", n);
                  }
              - if:
                  condition:
                    lambda: 'return id(pending_beep) && id(pending_beep_fail);'
                  then:
                    - lambda: 'id(pending_beep) = false;'
                    - rtttl.play: "fail:d=8,o=5,b=220:e,c,a4,p"
              - if:
                  condition:
                    lambda: 'return id(pending_beep) && !id(pending_beep_fail);'
                  then:
                    - lambda: 'id(pending_beep) = false;'
                    - rtttl.play: "ping:d=16,o=6,b=300:e,g"

spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

display:
  - platform: st7789v
    model: CUSTOM
    id: main_display
    cs_pin: GPIO5
    dc_pin: GPIO23
    reset_pin: GPIO18
    rotation: ${rotate_display}
    height: 240
    width: 135
    offset_height: 40
    offset_width: 52
    update_interval: 250ms
    lambda: |-
      const int W = it.get_width();
      const int H = it.get_height();

      it.fill(Color(0, 0, 0));

      // header bar
      it.filled_rectangle(0, 0, W, 22, Color(20, 20, 40));
      it.print(4, 3, id(font_med), Color(180, 200, 255), "GitHub");

      // battery % (header, between label and CI tally)
      {
        int bl = 0;
        if (!std::isnan(id(battery_level).state)) bl = (int) id(battery_level).state;
        if (bl < 0) bl = 0; if (bl > 100) bl = 100;
        char batt[8];
        sprintf(batt, "%d%%", bl);
        Color bc = bl < 20 ? Color(255, 80, 80) :
                   bl < 50 ? Color(255, 220, 80) :
                             Color(120, 255, 120);
        it.print(72, 3, id(font_med), bc, batt);
      }

      // CI tally: right-aligned in the header
      {
        const int slot_w = 32;
        int base_x = W - slot_w * 3 - 4;
        char nbuf[8];
        it.print(base_x, 5, id(mdi_status), Color(255, 220, 120), "\U000F0453");
        sprintf(nbuf, "%d", id(ci_running));
        it.print(base_x + 14, 3, id(font_small), Color(255, 220, 120), nbuf);
        it.print(base_x + slot_w, 5, id(mdi_status), Color(140, 255, 160), "\U000F012C");
        sprintf(nbuf, "%d", id(ci_success));
        it.print(base_x + slot_w + 14, 3, id(font_small), Color(140, 255, 160), nbuf);
        it.print(base_x + slot_w * 2, 5, id(mdi_status), Color(255, 120, 120), "\U000F0156");
        sprintf(nbuf, "%d", id(ci_failed));
        it.print(base_x + slot_w * 2 + 14, 3, id(font_small), Color(255, 120, 120), nbuf);
      }

      bool events_mode = id(idle_frames) > 0 && !id(carousel_lines).empty();

      if (events_mode) {
        int idx = id(carousel_idx);
        int n = (int) id(carousel_lines).size();
        if (idx < 0) idx = 0;
        if (idx >= n) idx = n - 1;

        const std::string &text = id(carousel_lines)[idx];
        const std::string &detail = (idx < (int) id(carousel_detail).size())
                                      ? id(carousel_detail)[idx]
                                      : std::string();
        bool cp = id(carousel_copilot)[idx] != 0;
        bool fail = id(carousel_ci_fail)[idx] != 0;
        Color fg = fail ? Color(255, 120, 120) :
                   cp   ? Color(200, 170, 255) :
                          Color(120, 220, 255);
        int cx = W / 2;
        int headline_y = 50;
        int detail_y = 86;
        if (cp) {
          it.print(6, headline_y - 12, id(mdi_copilot), Color(180, 140, 255), "\U000F06A9");
        }
        it.print(cx, headline_y, id(font_big), fg, TextAlign::CENTER, text.c_str());
        if (!detail.empty()) {
          it.print(cx, detail_y, id(font_med), Color(200, 200, 220),
                   TextAlign::CENTER, detail.c_str());
        }
        it.print(4, H - 10, id(font_small), Color(120, 120, 150),
                 TextAlign::BASELINE_LEFT, "A: dismiss");

        // carousel dots
        int dots_y = H - 4;
        int spacing = 8;
        int first_x = cx - (n - 1) * spacing / 2;
        for (int i = 0; i < n; i++) {
          Color dc = (i == idx) ? Color(220, 230, 255) : Color(60, 80, 100);
          it.filled_circle(first_x + i * spacing, dots_y, 2, dc);
        }
      } else {
        // DVD-bouncer github logo
        static const Color palette[5] = {
          Color(120, 220, 255),
          Color(180, 140, 255),
          Color(255, 220, 120),
          Color(140, 255, 160),
          Color(255, 160, 200),
        };
        Color c = palette[id(gh_color_idx) % 5];
        it.print(id(gh_x), id(gh_y), id(mdi_big), c, "\U000F02A4");
      }

sensor:
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      // AXP192 battery voltage: reg 0x78 (hi 8 bits) + 0x79 (lo 4 bits), 1.1 mV/LSB
      uint8_t reg = 0x78;
      if (id(bus_a)->write(0x34, &reg, 1, false) != i2c::ERROR_OK) return NAN;
      uint8_t buf[2];
      if (id(bus_a)->read(0x34, buf, 2) != i2c::ERROR_OK) return NAN;
